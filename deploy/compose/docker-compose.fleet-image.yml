      FM_GROUP_POLICY_RETENTION_FALLBACK_DAYS: "${FM_GROUP_POLICY_RETENTION_FALLBACK_DAYS:-}"
      FM_GROUP_POLICY_SWEEP_INTERVAL_MINUTES: "${FM_GROUP_POLICY_SWEEP_INTERVAL_MINUTES:-}"
      FM_GROUP_POLICY_AUDIT_RETENTION_STANDARD_DAYS: "${FM_GROUP_POLICY_AUDIT_RETENTION_STANDARD_DAYS:-}"
      FM_GROUP_POLICY_AUDIT_RETENTION_OPERATIONAL_DAYS: "${FM_GROUP_POLICY_AUDIT_RETENTION_OPERATIONAL_DAYS:-}"
      FM_GROUP_POLICY_AUDIT_RETENTION_CRITICAL_DAYS: "${FM_GROUP_POLICY_AUDIT_RETENTION_CRITICAL_DAYS:-}"
      FM_GROUP_POLICY_AUDIT_RETENTION_CUSTOM_DAYS: "${FM_GROUP_POLICY_AUDIT_RETENTION_CUSTOM_DAYS:-}"
      FM_GROUP_POLICY_AUDIT_RETENTION_FALLBACK_DAYS: "${FM_GROUP_POLICY_AUDIT_RETENTION_FALLBACK_DAYS:-}"
      # Per-org bootstrap defaults (backend reads via process.env)
      FM_DEFAULT_DASHBOARD_NAME: "${FM_DEFAULT_DASHBOARD_NAME:-}"
      FM_DEFAULT_DASHBOARD_TYPE: "${FM_DEFAULT_DASHBOARD_TYPE:-}"
      # Frontend runtime tunables (consumed by entrypoint.sh → runtime-config.js)
      FM_LOG_BUFFER_MAX: "${FM_LOG_BUFFER_MAX:-}"
      FM_LOG_CATEGORY_MAX: "${FM_LOG_CATEGORY_MAX:-}"
      FM_AUDIT_PAGE_SIZE: "${FM_AUDIT_PAGE_SIZE:-}"
      FM_ZITADEL_PASSWORD_MIN_LENGTH: "${FM_ZITADEL_PASSWORD_MIN_LENGTH:-}"
      FM_NODE_RED_URL: "${FM_NODE_RED_URL:-}"
      FM_NODE_RED_SESSION_URL: "${FM_NODE_RED_SESSION_URL:-}"
      # Local CA mount root — used by certificate.IssueDeviceCert and trusted
      # at startup for outbound HTTPS (entrypoint installs ca.crt + sets NODE_EXTRA_CA_CERTS).
      FM_LOCAL_CA_DIR: "${FM_LOCAL_CA_DIR:-/app/state/tls}"
      # FM_DEVICE_MTLS — when true, /shelly requires devices to present an
      # FM-issued client cert. Traefik validates against state/tls/ca.crt.
      # Flip only after FM-issued certs have been pushed to the fleet.
      FM_DEVICE_MTLS: "${FM_DEVICE_MTLS:-false}"
      FM_DEVICE_INGRESS_TRUSTED_PROXY_CIDRS: "${FM_DEVICE_INGRESS_TRUSTED_PROXY_CIDRS:-}"
      FM_AUTHZ_INIT_RETRY_MS: "${FM_AUTHZ_INIT_RETRY_MS:-}"
      FM_AUTHZ_VERSION_TTL_SECONDS: "${FM_AUTHZ_VERSION_TTL_SECONDS:-}"
      FM_DEVICE_INGRESS_ALLOW_PLAIN_WS: "${FM_DEVICE_INGRESS_ALLOW_PLAIN_WS:-}"
      FM_DEVICE_INGRESS_ENFORCEMENT_MODE: "${FM_DEVICE_INGRESS_ENFORCEMENT_MODE:-}"
      FM_DEVICE_INGRESS_HANDSHAKES_PER_IP_PER_MINUTE: "${FM_DEVICE_INGRESS_HANDSHAKES_PER_IP_PER_MINUTE:-}"
      FM_DEVICE_INGRESS_HANDSHAKES_PER_ORG_PER_MINUTE: "${FM_DEVICE_INGRESS_HANDSHAKES_PER_ORG_PER_MINUTE:-}"
      FM_DEVICE_INGRESS_HANDSHAKES_PER_IDENTITY_PER_MINUTE: "${FM_DEVICE_INGRESS_HANDSHAKES_PER_IDENTITY_PER_MINUTE:-}"
      FM_DEVICE_INGRESS_MAX_CONNECTIONS_PER_IP: "${FM_DEVICE_INGRESS_MAX_CONNECTIONS_PER_IP:-}"
      FM_DEVICE_INGRESS_MAX_CONNECTIONS_PER_ORG: "${FM_DEVICE_INGRESS_MAX_CONNECTIONS_PER_ORG:-}"
      FM_WAITING_ROOM_RECONNECT_MAX_PER_WINDOW: "${FM_WAITING_ROOM_RECONNECT_MAX_PER_WINDOW:-}"
      FM_DEVICE_INGRESS_TOKEN_PEPPER: "${FM_DEVICE_INGRESS_TOKEN_PEPPER:-}"
      FM_DEVICE_INGRESS_TRUSTED_CERT_PEM_HEADER: "${FM_DEVICE_INGRESS_TRUSTED_CERT_PEM_HEADER:-}"
      FM_DEVICE_INGRESS_WAITING_ROOM_ENABLED: "${FM_DEVICE_INGRESS_WAITING_ROOM_ENABLED:-}"
      FM_MOBILE_BOOTSTRAP_DEVICE_LIMIT: "${FM_MOBILE_BOOTSTRAP_DEVICE_LIMIT:-}"
      FM_MOBILE_SYNC_DELTA_LIMIT: "${FM_MOBILE_SYNC_DELTA_LIMIT:-}"
      FM_ZITADEL_SCIM_ENABLED: "${FM_ZITADEL_SCIM_ENABLED:-}"
      # Waiting-room org for gate-less devices; empty = code default.
      FM_DEVICE_INGRESS_DEFAULT_ORGANIZATION_ID: "${FM_DEVICE_INGRESS_DEFAULT_ORGANIZATION_ID:-}"
      # Discovery.AdmitDevice — outbound WS configured on the device.
      # FM_DEVICE_WS_URL empty falls back to FM_PUBLIC_BASE_URL → ws://; if
      # both empty, uses ws://fleet-manager:7011/shelly (Docker network).
      FM_PUBLIC_BASE_URL: "${FM_PUBLIC_BASE_URL:-}"
      FM_DEVICE_WS_URL: "${FM_DEVICE_WS_URL:-}"
      FM_DEVICE_WS_SSL_CA: "${FM_DEVICE_WS_SSL_CA:-*}"
      FM_ADMISSION_TTL_SECONDS: "${FM_ADMISSION_TTL_SECONDS:-300}"
      # SSRF guard for admission target host. LAN deploys want true; SaaS
      # with public reachable devices should set false.
      FM_DISCOVERY_ALLOW_PRIVATE: "${FM_DISCOVERY_ALLOW_PRIVATE:-true}"
      # Waiting Room admission pipeline.
      FM_WAITING_ROOM_CONFIG_TIMEOUT_MS: "${FM_WAITING_ROOM_CONFIG_TIMEOUT_MS:-}"
      # Observability bearer token for /metrics scrapers.
      FM_OBS_AUTH_TOKEN: "${FM_OBS_AUTH_TOKEN:-}"
      # Boot observability level 0-3 when observability is on.
      FM_OBSERVABILITY_LEVEL: "${FM_OBSERVABILITY_LEVEL:-}"
      # Ms over rolling P95 that flags an RPC as slow.
      FM_OBS_SLOW_RPC_OFFSET_MS: "${FM_OBS_SLOW_RPC_OFFSET_MS:-}"
      # Integration.Endpoint.Test deadline.
      FM_INTEGRATION_TEST_TIMEOUT_MS: "${FM_INTEGRATION_TEST_TIMEOUT_MS:-}"
      # Periodic sweep for orphaned in_progress push rows.
      FM_PUSH_RECLAIM_INTERVAL_MS: "${FM_PUSH_RECLAIM_INTERVAL_MS:-}"
      # Plugin upload zip-bomb guards.
      FM_PLUGIN_MAX_FILES: "${FM_PLUGIN_MAX_FILES:-}"
      FM_PLUGIN_MAX_DEPTH: "${FM_PLUGIN_MAX_DEPTH:-}"
      FM_PLUGIN_MAX_UNCOMPRESSED_BYTES: "${FM_PLUGIN_MAX_UNCOMPRESSED_BYTES:-}"
      FM_PLUGIN_COMMAND_QUEUE_MAX: "${FM_PLUGIN_COMMAND_QUEUE_MAX:-}"
      FM_BOOT_BACKFILL_CONCURRENCY: "${FM_BOOT_BACKFILL_CONCURRENCY:-}"
      # AlertEngine fan-out parallelism.
      FM_ALERT_DISPATCH_CONCURRENCY: "${FM_ALERT_DISPATCH_CONCURRENCY:-}"
      # Cap on persisted error_message columns (audit + delivery_attempts).
      FM_PERSISTED_ERROR_MESSAGE_MAX_CHARS: "${FM_PERSISTED_ERROR_MESSAGE_MAX_CHARS:-}"
      # Hard deadline on AlertEngine.handleGroupFlush.
      FM_GROUP_FLUSH_TIMEOUT_MS: "${FM_GROUP_FLUSH_TIMEOUT_MS:-}"
      # Control-plane contract gates: sanitized export manifest + device-usage API.
      FM_CONTRACT_EXPORT_SANITIZED_MANIFEST: "${FM_CONTRACT_EXPORT_SANITIZED_MANIFEST:-}"
      FM_CONTRACT_DEVICE_USAGE_API: "${FM_CONTRACT_DEVICE_USAGE_API:-}"
    volumes:
      - fm-backend-cfg-v:/app/backend/cfg/
      - fm-backend-plugins-v:/app/plugins
      - fm-backend-uploads-v:/app/backend/uploads
      - fm-backend-data-v:/app/backend/data
      # Local CA for selfsigned mode — entrypoint installs ca.crt and exports
      # NODE_EXTRA_CA_CERTS so Zitadel introspection over self-signed succeeds.
      - ../state/tls:/app/state/tls:ro
      # OIDC introspection + service-user key files — populated by
      # bootstrap-zitadel.sh when FM_OIDC_AUTH_METHOD=jwt-profile.
      - ../state/secrets:/app/state/secrets:ro
      # Deploy manifest — read-only. FM cwd is /app/backend, and it reads
      # deploy/state/manifest.json relative to that, so mount under /app/backend.
      - ../state/contract:/app/backend/deploy/state:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /app/backend/logs:size=32M
    stop_grace_period: 30s
    networks:
      - fleet-net
    depends_on:
      fleet-db:
        condition: "service_healthy"
      redis:
        condition: "service_healthy"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7011/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fleet-net:
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.resource_type: "network"

volumes:
  fm-backend-cfg-v:
    labels: &fm-image-volume-labels
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.resource_type: "volume"
      fleet.service: "fleet-manager"
  fm-backend-plugins-v:
    labels: *fm-image-volume-labels
  fm-backend-uploads-v:
    labels: *fm-image-volume-labels
  fm-backend-data-v:
    labels: *fm-image-volume-labels
  redis-data:
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.resource_type: "volume"
      fleet.service: "redis"
