# Fleet Manager application — pulled from Docker Hub
#
# Used by deploy-public.sh for community deployments.
# Same as docker-compose.fleet.yml but uses a pre-built image instead of
# building from source.

services:
  redis:
    image: redis:${REDIS_VERSION:-7.4.2-alpine}
    container_name: fm-redis
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.version: "${REDIS_VERSION:-7.4.2-alpine}"
      fleet.commit: "${FM_BUILD_COMMIT:-unknown}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.service: "redis"
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - ${REDIS_APPENDONLY:-no}
      - --appendfsync
      - ${REDIS_APPENDFSYNC:-everysec}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - fleet-net

  fleet-manager:
    image: ${DOCKER_HUB_IMAGE:-shellygroup/fleet-management}:${FM_VERSION:-latest}
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.version: "${FM_VERSION:-unknown}"
      fleet.commit: "${FM_BUILD_COMMIT:-unknown}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.service: "fleet-manager"
    env_file:
      - path: ../state/fm-runtime.env
        required: false
    environment:
      NODE_OPTIONS: "--max-old-space-size=${FM_HEAP_SIZE}"
      FLEET_MANAGER_PORT: ${FLEET_MANAGER_PORT}
      FM_DEV_MODE: "${FM_DEV_MODE:-false}"
      FM_LOCAL_WS_PORT: "${FM_LOCAL_WS_PORT:-}"
      FM_NODE_RED_ENABLED: "${FM_NODE_RED_ENABLED:-false}"
      FM_NODE_RED_SESSION_ALLOWED_ORIGINS: "${FM_NODE_RED_SESSION_ALLOWED_ORIGINS:-}"
      FM_NODE_RED_SESSION_COOKIE_SAMESITE: "${FM_NODE_RED_SESSION_COOKIE_SAMESITE:-strict}"
      FM_LOCATION_SITE_TYPES: "${FM_LOCATION_SITE_TYPES:-}"
      FM_LOCATION_BUILDING_TYPES: "${FM_LOCATION_BUILDING_TYPES:-}"
      FM_LOCATION_ROOM_TYPES: "${FM_LOCATION_ROOM_TYPES:-}"
      FM_LOCATION_OPERATIONAL_TIERS: "${FM_LOCATION_OPERATIONAL_TIERS:-}"
      FM_LOCATION_COMPLIANCE_TAGS: "${FM_LOCATION_COMPLIANCE_TAGS:-}"
      FM_LOCATION_ACCESS_PROCEDURES: "${FM_LOCATION_ACCESS_PROCEDURES:-}"
      FM_LOCATION_REGULATORY_ZONES: "${FM_LOCATION_REGULATORY_ZONES:-}"
      FM_LOCATION_ENERGY_CERTIFICATIONS: "${FM_LOCATION_ENERGY_CERTIFICATIONS:-}"
      FM_LOCATION_CONTACT_ROLES: "${FM_LOCATION_CONTACT_ROLES:-}"
      PLUGINS_FOLDER: /app/plugins
      fleet-manager_internalStorage__connection__host: fleet-db
      fleet-manager_internalStorage__connection__user: postgres
      fleet-manager_internalStorage__connection__password: ${POSTGRES_PASSWORD}
      fleet-manager_internalStorage__connection__database: fleet
      fleet-manager_observability: "${FM_OBSERVABILITY}"
      # At-rest key for integration secrets (slack/teams/telegram/OAuth);
      # JWT_SECRET signs PATs and is the legacy fallback for the encryption key.
      FM_SECRET_ENCRYPTION_KEY: "${FM_SECRET_ENCRYPTION_KEY}"
      FM_SECRET_KDF_SALT: "${FM_SECRET_KDF_SALT}"
      JWT_SECRET: "${JWT_SECRET}"
      # Phase A stability tunables.
      FM_RUNTIME_KEYS_CACHE_TTL_MS: "${FM_RUNTIME_KEYS_CACHE_TTL_MS}"
      ZITADEL_HTTP_TIMEOUT_MS: "${ZITADEL_HTTP_TIMEOUT_MS}"
      ZITADEL_LIST_PAGE_SIZE: "${ZITADEL_LIST_PAGE_SIZE}"
      ZITADEL_PAT_DEFAULT_EXPIRATION_DAYS: "${ZITADEL_PAT_DEFAULT_EXPIRATION_DAYS}"
      # Shared Redis runtime — single source of truth.
      FM_REDIS_URL: "${FM_REDIS_URL:-redis://fm-default:${REDIS_FM_PASSWORD}@redis:6379}"
      FM_REDIS_DISABLED: "${FM_REDIS_DISABLED:-false}"
      FM_REDIS_KEY_PREFIX: "${FM_REDIS_KEY_PREFIX:-fm}"
      FM_AUTHZ_L1_MAX_ENTRIES: "${FM_AUTHZ_L1_MAX_ENTRIES}"
