# Traefik reverse proxy with automatic Let's Encrypt SSL
#
# Used by: deploy-public.sh up --ssl --domain example.com
# Provisions HTTPS certificates automatically via ACME (Let's Encrypt).
# Uses TLS-ALPN-01 challenge — only port 443 needed (no port 80 required).
# Optionally redirects HTTP to HTTPS if port 80 is open.
#
# Uses file provider only — no Docker socket mount needed.
# Routes are generated into state/traefik-dynamic/ by the deploy script.
#
# Requirements:
#   - Domain pointing to this machine's public IP
#   - Port 443 open (firewall / security group)
#   - Port 80 optional (enables HTTP→HTTPS redirect)

services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:-v3.7.5}
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.version: "${TRAEFIK_VERSION:-v3.7.5}"
      fleet.commit: "${FM_BUILD_COMMIT:-unknown}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.service: "traefik"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    command:
      # File provider: loads routing config from dynamic directory
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # HTTP entrypoint (port 80) — redirect is applied per-router via middleware.
      # When FM_PLAIN_WS=true, /shelly accepts plain ws:// for Wall Display devices.
      - "--entrypoints.web.address=:80"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Internal ping entrypoint (container-only)
      - "--entrypoints.ping.address=:8082"
      - "--entrypoints.websecure.transport.lifecycle.graceTimeOut=300"
      # Let's Encrypt ACME via TLS-ALPN-01 (port 443 only, no port 80 needed)
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${SSL_EMAIL:-admin@localhost}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Timeouts for WebSocket + long-lived connections
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=300"
      # Healthcheck ping endpoint
      - "--ping=true"
      - "--ping.entryPoint=ping"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../state/traefik-dynamic:/etc/traefik/dynamic:ro
      - ../state/letsencrypt:/letsencrypt
      # Only ca.crt — never ca.key. Used when FM_DEVICE_MTLS=true.
      - ../state/tls/ca.crt:/etc/traefik/certs/ca.crt:ro
    tmpfs:
      - /tmp:size=16M
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/ping >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "5"

networks:
  fleet-net:
