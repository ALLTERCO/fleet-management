# Traefik reverse proxy with automatic Let's Encrypt SSL
#
# Used by: deploy-public.sh up --ssl --domain example.com
# Provisions HTTPS certificates automatically via ACME (Let's Encrypt).
# Redirects HTTP to HTTPS. Routes all traffic to Fleet Manager and Zitadel.
#
# Uses file provider only — no Docker socket mount needed.
# Routes are generated into state/traefik-dynamic/ by the deploy script.
#
# Requirements:
#   - Domain pointing to this machine's public IP
#   - Ports 80 and 443 open (firewall / security group)

services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:-v3.6.10}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    command:
      # File provider: loads routing config from dynamic directory
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # HTTP entrypoint: redirect to HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Internal ping entrypoint (container-only)
      - "--entrypoints.ping.address=:8082"
      - "--entrypoints.websecure.transport.lifecycle.graceTimeOut=300"
      # Let's Encrypt ACME
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${SSL_EMAIL:-admin@localhost}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Timeouts for WebSocket + long-lived connections
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=300"
      # Healthcheck ping endpoint
      - "--ping=true"
      - "--ping.entryPoint=ping"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../state/traefik-dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    tmpfs:
      - /tmp:size=16M
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/ping >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "5"

networks:
  fleet-net:

volumes:
  traefik-certs:
