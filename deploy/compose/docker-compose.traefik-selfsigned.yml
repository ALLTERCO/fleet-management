# Traefik reverse proxy with locally managed TLS certificates
#
# Used by: deploy-public.sh up --ssl selfsigned
#          deploy-public.sh up --ssl custom --cert ... --key ...
# For LAN / internal deployments where no public domain is available, or
# for deployments that already have a certificate/key pair to mount into state.
#
# Uses file provider only — no Docker socket mount needed.
# Routes are generated into state/tls/dynamic/ by the deploy script.

services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:-v3.7.5}
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.version: "${TRAEFIK_VERSION:-v3.7.5}"
      fleet.commit: "${FM_BUILD_COMMIT:-unknown}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.service: "traefik"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    command:
      # File provider: loads TLS certs + routing config from dynamic directory
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # HTTP entrypoint (port 80) — redirect is applied per-router via middleware.
      # When FM_PLAIN_WS=true, /shelly accepts plain ws:// for Wall Display devices.
      - "--entrypoints.web.address=:80"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Internal ping entrypoint (container-only)
      - "--entrypoints.ping.address=:8082"
      - "--entrypoints.websecure.transport.lifecycle.graceTimeOut=300"
      # Timeouts for WebSocket + long-lived connections
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=300"
      # Healthcheck ping endpoint
      - "--ping=true"
      - "--ping.entryPoint=ping"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Per-file mounts so Traefik never sees ca.key (FM container is the only
      # legitimate consumer of the CA private key).
      - ../state/tls/ca.crt:/etc/traefik/certs/ca.crt:ro
      - ../state/tls/server.crt:/etc/traefik/certs/server.crt:ro
      - ../state/tls/server.key:/etc/traefik/certs/server.key:ro
      - ../state/tls/dynamic:/etc/traefik/dynamic:ro
    tmpfs:
      - /tmp:size=16M
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/ping >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "5"

networks:
  fleet-net:
