# Traefik reverse proxy with locally managed TLS certificates
#
# Used by: deploy-public.sh up --ssl selfsigned
#          deploy-public.sh up --ssl custom --cert ... --key ...
# For LAN / internal deployments where no public domain is available, or
# for deployments that already have a certificate/key pair to mount into state.
#
# The deploy script generates a self-signed CA + server certificate
# into deploy/state/tls/ before starting this compose overlay.

services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:-v3.6.10}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    command:
      # Docker provider: auto-discovers services via labels
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}_fleet-net"
      # File provider: loads TLS certificate config
      - "--providers.file.filename=/etc/traefik/dynamic/tls.yml"
      # HTTP entrypoint: redirect to HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Internal ping entrypoint (container-only)
      - "--entrypoints.ping.address=:8082"
      - "--entrypoints.websecure.transport.lifecycle.graceTimeOut=300"
      # Timeouts for WebSocket + long-lived connections
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=300"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=300"
      # Healthcheck ping endpoint
      - "--ping=true"
      - "--ping.entryPoint=ping"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../state/tls:/etc/traefik/certs:ro
      - ../state/tls/dynamic:/etc/traefik/dynamic:ro
    tmpfs:
      - /tmp:size=16M
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "5"

  # Override Fleet Manager with Traefik labels
  fleet-manager:
    labels:
      - "traefik.enable=true"
      # Fleet Manager routes (catch-all)
      - "traefik.http.routers.fleet.rule=PathPrefix(`/`)"
      - "traefik.http.routers.fleet.entrypoints=websecure"
      - "traefik.http.routers.fleet.tls=true"
      - "traefik.http.routers.fleet.priority=10"
      - "traefik.http.routers.fleet.middlewares=strip-identity@docker"
      - "traefik.http.services.fleet.loadbalancer.server.port=7011"
      # Middleware: strip identity headers
      - "traefik.http.middlewares.strip-identity.headers.customResponseHeaders.Server="
      - "traefik.http.middlewares.strip-identity.headers.customResponseHeaders.X-Powered-By="

  # Override Zitadel with Traefik labels
  zitadel:
    labels:
      - "traefik.enable=true"
      # Zitadel routes (OIDC paths)
      - "traefik.http.routers.zitadel.rule=PathPrefix(`/.well-known/`) || PathPrefix(`/oauth/`) || PathPrefix(`/oidc/`) || PathPrefix(`/ui/`) || PathPrefix(`/debug/`) || PathPrefix(`/v2beta/`) || PathPrefix(`/v2/`) || PathPrefix(`/management/`) || PathPrefix(`/admin/`) || PathPrefix(`/auth/`) || PathPrefix(`/assets/v1/`)"
      - "traefik.http.routers.zitadel.entrypoints=websecure"
      - "traefik.http.routers.zitadel.tls=true"
      - "traefik.http.routers.zitadel.priority=100"
      - "traefik.http.routers.zitadel.middlewares=strip-feature-policy@docker"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      # Middleware: strip deprecated Feature-Policy header
      - "traefik.http.middlewares.strip-feature-policy.headers.customResponseHeaders.Feature-Policy="

networks:
  fleet-net:
