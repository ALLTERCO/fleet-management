# Base services: TimescaleDB
# This is the foundation — always runs for all profiles.
#
# Old file: /docker-compose.yml
# Changes: secrets externalized, images pinned via VERSIONS.env

name: ${COMPOSE_PROJECT_NAME}

services:
  fleet-db:
    restart: unless-stopped
    image: timescale/timescaledb:${TIMESCALEDB_VERSION}
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.version: "${TIMESCALEDB_VERSION:-unknown}"
      fleet.commit: "${FM_BUILD_COMMIT:-unknown}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.service: "fleet-db"
    security_opt:
      - no-new-privileges:true
    volumes:
      - fleet-db-data:/var/lib/postgresql/data
      - ../state/init-fleet-db.sql:/docker-entrypoint-initdb.d/init-fleet-db.sql:ro
    command: >-
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE}
      -c work_mem=${PG_WORK_MEM}
      -c maintenance_work_mem=${PG_MAINT_WORK_MEM}
      -c max_connections=${PG_MAX_CONNECTIONS}
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fleet
      # Force the data dir inside the mounted volume. The timescaledb image
      # on PG18 puts its default PGDATA at /var/lib/postgresql/18/docker,
      # which is OUTSIDE the legacy /var/lib/postgresql/data mount — that
      # left every restart booting with a fresh empty cluster.
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      fleet-net:
    tty: true
    stdin_open: true
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  fleet-net:
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.resource_type: "network"

volumes:
  fleet-db-data:
    labels:
      fleet.managed_by: "${FM_MANAGED_BY:-fleet-manager}"
      fleet.client: "${FM_CLIENT_ID:-shared}"
      fleet.environment: "${FM_ENVIRONMENT_ID:-unknown}"
      fleet.mode: "${FM_TOPOLOGY_MODE:-single-tenant}"
      fleet.compose_project: "${FM_COMPOSE_PROJECT_NAME:-unknown}"
      fleet.resource_type: "volume"
      fleet.service: "fleet-db"
