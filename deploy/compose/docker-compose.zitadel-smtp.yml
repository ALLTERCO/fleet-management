# Optional Zitadel identity-email SMTP configuration.
# Included only when ZITADEL_SMTP_HOST is set and validated by deploy scripts.
services:
  zitadel-api:
    environment:
      - ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS=${ZITADEL_SMTP_TLS:-false}
      - ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST=${ZITADEL_SMTP_HOST}
      - ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER=${ZITADEL_SMTP_USER:-}
      - ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD=${ZITADEL_SMTP_PASSWORD:-}
      - ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM=${ZITADEL_SMTP_FROM}
      - ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME=${ZITADEL_SMTP_FROM_NAME:-Fleet Manager}
