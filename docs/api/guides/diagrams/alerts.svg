<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 760" width="1480" height="760" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The life of an alert: pending, firing, acknowledged, cleared, resolved"><title>The life of an alert: pending, firing, acknowledged, cleared, resolved</title><desc>When a rule fires it opens one alert per target. The alert waits in pending until the problem lasts long enough, then it is firing (active). Ack and Unack move it between firing and acknowledged; it is still firing either way. For latched alarms the condition clearing moves it to cleared (cleared_unack or cleared_ack), where it stays visible until an operator resolves it by hand. Most alerts resolve on their own the moment the condition clears. In-between states, recovering, no data, and evaluation error, cover a settling reading, a quiet sensor, or a rule that cannot be checked; they can go back to firing or resolve. Silence mutes notifications without changing the state.</desc><rect width="1480" height="760" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">The life of an alert</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">One alert per rule and target. It moves through these states (the code value is shown under each).</text><circle cx="48" cy="288" r="6" fill="#25324A"/><rect x="80" y="230" width="190" height="116" rx="12" fill="#eff0f3" stroke="#5B6B82" stroke-width="1.5"/><defs><linearGradient id="t175_260" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="157" y="242" width="36" height="36" rx="8.459999999999999" fill="url(#t175_260)"/><g transform="translate(175,260) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></g><text x="175" y="296" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Pending</text><text x="175" y="318" text-anchor="middle" font-size="12.5" fill="#7C8A9C">pending</text><rect x="400" y="230" width="190" height="116" rx="12" fill="#f9edec" stroke="#C24A3D" stroke-width="1.5"/><defs><linearGradient id="t495_260" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C24A3D"/><stop offset="1" stop-color="#a53f34"/></linearGradient></defs><rect x="477" y="242" width="36" height="36" rx="8.459999999999999" fill="url(#t495_260)"/><g transform="translate(495,260) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></g><text x="495" y="296" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Firing</text><text x="495" y="318" text-anchor="middle" font-size="12.5" fill="#7C8A9C">active</text><rect x="700" y="230" width="225" height="116" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t812.5_260" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="794.5" y="242" width="36" height="36" rx="8.459999999999999" fill="url(#t812.5_260)"/><g transform="translate(812.5,260) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></g><text x="812.5" y="296" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Acknowledged</text><text x="812.5" y="318" text-anchor="middle" font-size="12.5" fill="#7C8A9C">acknowledged</text><rect x="400" y="490" width="190" height="116" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t495_520" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="477" y="502" width="36" height="36" rx="8.459999999999999" fill="url(#t495_520)"/><g transform="translate(495,520) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M17 17H4a1 1 0 0 1-.74-1.673C4.59 13.956 6 12.499 6 8a6 6 0 0 1 .258-1.742"/><path d="M8.668 3.01A6 6 0 0 1 18 8c0 2.687.77 4.653 1.707 6.05"/><path d="m2 2 20 20"/></g><text x="495" y="556" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Cleared</text><text x="495" y="578" text-anchor="middle" font-size="12.5" fill="#7C8A9C">cleared_unack</text><rect x="700" y="490" width="225" height="116" rx="12" fill="#eaf5f0" stroke="#2E9E6B" stroke-width="1.5"/><defs><linearGradient id="t812.5_520" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="794.5" y="502" width="36" height="36" rx="8.459999999999999" fill="url(#t812.5_520)"/><g transform="translate(812.5,520) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M17 17H4a1 1 0 0 1-.74-1.673C4.59 13.956 6 12.499 6 8a6 6 0 0 1 .258-1.742"/><path d="M8.668 3.01A6 6 0 0 1 18 8c0 2.687.77 4.653 1.707 6.05"/><path d="m2 2 20 20"/></g><text x="812.5" y="556" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Cleared, acked</text><text x="812.5" y="578" text-anchor="middle" font-size="12.5" fill="#7C8A9C">cleared_ack</text><rect x="1240" y="340" width="200" height="130" rx="12" fill="#edeff4" stroke="#4F5D95" stroke-width="1.5"/><defs><linearGradient id="t1340_370" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4F5D95"/><stop offset="1" stop-color="#434f7f"/></linearGradient></defs><rect x="1322" y="352" width="36" height="36" rx="8.459999999999999" fill="url(#t1340_370)"/><g transform="translate(1340,370) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></g><text x="1340" y="406" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Resolved</text><text x="1340" y="428" text-anchor="middle" font-size="12.5" fill="#7C8A9C">resolved</text><rect x="80" y="476" width="300" height="150" rx="12" fill="none" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="5 4"/><text x="94" y="496" font-size="10.5" font-weight="400" letter-spacing="0.06em" fill="#9AA8BA">IN-BETWEEN STATES</text><text x="230" y="524" text-anchor="middle" font-size="11.5" fill="#7C8A9C">recovering: a reading settling</text><text x="230" y="548" text-anchor="middle" font-size="11.5" fill="#7C8A9C">no_data: the sensor is quiet</text><text x="230" y="572" text-anchor="middle" font-size="11.5" fill="#7C8A9C">evaluation_error: rule can’t run</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M56,288 L80,288" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M270,288 L400,288" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="300.2" y="278" width="69.6" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="335" y="292" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">it fires</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M590,274 L700,274" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="645" y="264" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Ack</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M700,302 L590,302" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="645" y="318" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Unack</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M495,346 L495,490" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="433.4" y="408" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="495" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">clears · latched</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M812,346 L812,490" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="750.4" y="408" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="812" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">clears · latched</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M590,532 L700,532" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="645" y="522" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Ack</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M700,560 L590,560" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="645" y="576" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Unack</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M540,230 L540,190 L1200,190 L1200,375 L1240,375" fill="none" stroke="#7C8A9C" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#a7C8A9C)"/><text x="870" y="182" text-anchor="middle" font-size="12" fill="#7C8A9C">condition clears (most alerts resolve on their own)</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M925,274 L1120,274 L1120,405 L1240,405" fill="none" stroke="#7C8A9C" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M925,548 L1160,548 L1160,435 L1240,435" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="980.4" y="538" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="1042" y="552" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">resolved by hand</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M230,476 L230,435 L420,435 L420,346" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)" marker-start="url(#a7C8A9C)"/><rect x="263.4" y="425" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="325" y="439" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">settling ⇌ fires</text><text x="740" y="690" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Ack and Unack keep it firing, just seen. Cleared is only for latched alarms (smoke, flood); other alerts go straight to resolved.</text><text x="740" y="710" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Silence mutes the notifications without changing the state. A re-fire within the dedupe window reuses the same alert.</text></svg>