<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 452" width="1120" height="452" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Discover the API: browse it, download it, or introspect it at runtime"><title>Discover the API: browse it, download it, or introspect it at runtime</title><desc>A client is any program that talks to Fleet Manager, and it needs no SDK because the API describes itself three ways. Browse it: the docs page at /api/docs lists every method with its inputs, outputs, and the permission it needs. Download it: the same list is an OpenAPI 3.1 file at /api/docs/openapi.json, with the servers field set to that host, for codegen and tooling. Introspect it: every namespace answers a Describe call that returns its method, parameter, and response schemas plus permissions, so a client can validate against the live contract. Once you know the method you want, get a token (see Authentication) and open a connection to call it (see Transport and framing).</desc><rect width="1120" height="452" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Discover the API</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">A client needs no SDK: the API describes itself three ways. Then you authenticate and call.</text><rect x="40" y="120" width="336" height="182" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t208_150" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="190" y="132" width="36" height="36" rx="8.459999999999999" fill="url(#t208_150)"/><g transform="translate(208,150) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M10 4v4M2 8h20M6 4v4"/></g><text x="208" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Browse it</text><text x="208" y="208" text-anchor="middle" font-size="12.5" fill="#7C8A9C">/api/docs</text><text x="208" y="226" text-anchor="middle" font-size="12.5" fill="#7C8A9C">every method with its</text><text x="208" y="244" text-anchor="middle" font-size="12.5" fill="#7C8A9C">inputs, outputs, and the</text><text x="208" y="262" text-anchor="middle" font-size="12.5" fill="#7C8A9C">permission it needs</text><rect x="392" y="120" width="336" height="182" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t560_150" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="542" y="132" width="36" height="36" rx="8.459999999999999" fill="url(#t560_150)"/><g transform="translate(560,150) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></g><text x="560" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Download it</text><text x="560" y="208" text-anchor="middle" font-size="12.5" fill="#7C8A9C">/api/docs/openapi.json</text><text x="560" y="226" text-anchor="middle" font-size="12.5" fill="#7C8A9C">OpenAPI 3.1, servers set</text><text x="560" y="244" text-anchor="middle" font-size="12.5" fill="#7C8A9C">to this host, for codegen</text><text x="560" y="262" text-anchor="middle" font-size="12.5" fill="#7C8A9C">and other tooling</text><rect x="744" y="120" width="336" height="182" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t912_150" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="894" y="132" width="36" height="36" rx="8.459999999999999" fill="url(#t912_150)"/><g transform="translate(912,150) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m4 17 6-6-6-6"/><path d="M12 19h8"/></g><text x="912" y="186" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Introspect it</text><text x="912" y="208" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Describe, per namespace</text><text x="912" y="226" text-anchor="middle" font-size="12.5" fill="#7C8A9C">returns schemas and the</text><text x="912" y="244" text-anchor="middle" font-size="12.5" fill="#7C8A9C">permissions, so you check</text><text x="912" y="262" text-anchor="middle" font-size="12.5" fill="#7C8A9C">against the live contract</text><text x="560" y="356" text-anchor="middle" font-size="13" fill="#7C8A9C">Once you know the method you want:</text><rect x="397.15" y="382" width="89.7" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="442" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">get a token</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M506,392 L614,392" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="628.4" y="382" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="690" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">connect and call</text><text x="560" y="426" text-anchor="middle" font-size="11.5" fill="#7C8A9C">get a token: see Authentication · connect and call: see Transport and framing</text></svg>