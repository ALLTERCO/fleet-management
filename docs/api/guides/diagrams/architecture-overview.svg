<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 260" width="840" height="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Fleet Manager architecture overview">
  <title>One connection, calls and events</title>
  <desc>A client opens one authenticated WebSocket to Fleet Manager and sends JSON-RPC calls; Fleet Manager relays them to Shelly devices and pushes device events back over the same socket. An HTTP POST /rpc endpoint is a single-call fallback with no events.</desc>
  <defs>
    <marker id="aB" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4495D1"/></marker>
    <marker id="aP" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7A5AF0"/></marker>
    <marker id="aN" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8A97A8"/></marker>
  </defs>
  <rect x="0" y="0" width="840" height="260" fill="#ffffff"/>

  <!-- Client <-> FM -->
  <path d="M196,120 L338,120" stroke="#4495D1" stroke-width="1.75" fill="none" marker-end="url(#aB)"/>
  <path d="M338,160 L196,160" stroke="#7A5AF0" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aP)"/>
  <!-- FM <-> Devices -->
  <path d="M526,120 L668,120" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#aN)"/>
  <path d="M668,160 L526,160" stroke="#7A5AF0" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aP)"/>

  <!-- labels -->
  <g font-size="10.5" text-anchor="middle">
    <text x="267" y="112" fill="#2C6C99">calls · one WebSocket</text>
    <text x="267" y="176" fill="#6A5AB8">events pushed</text>
    <text x="597" y="112" fill="#6B7A90">relay (dst = device)</text>
    <text x="597" y="176" fill="#6A5AB8">device events</text>
  </g>

  <!-- Client -->
  <rect x="40" y="96" width="156" height="88" rx="6" fill="#EAF6FD" stroke="#4495D1" stroke-width="1.5"/>
  <text x="118" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#122A4F">Client</text>
  <text x="118" y="153" text-anchor="middle" font-size="11" fill="#6B7A90">app · browser · SDK</text>

  <!-- Fleet Manager -->
  <rect x="338" y="84" width="188" height="112" rx="6" fill="#F4F7FB" stroke="#003C82" stroke-width="1.5"/>
  <text x="432" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#122A4F">Fleet Manager</text>
  <text x="432" y="143" text-anchor="middle" font-size="11" fill="#6B7A90">auth · audit · transport</text>
  <text x="432" y="163" text-anchor="middle" font-size="11" fill="#3A6B92" font-family="ui-monospace,Menlo,monospace">wss://host/</text>

  <!-- Devices -->
  <rect x="668" y="96" width="156" height="88" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="746" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#122A4F">Shelly devices</text>
  <text x="746" y="153" text-anchor="middle" font-size="11" fill="#6B7A90">behind Fleet Manager</text>

  <!-- fallback caption -->
  <text x="432" y="226" text-anchor="middle" font-size="10.5" fill="#8A97A8">HTTP <tspan font-family="ui-monospace,Menlo,monospace" fill="#6B7A90">POST /rpc</tspan> — single-call fallback, no events</text>
</svg>
