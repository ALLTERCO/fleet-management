<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1230 560" width="1230" height="560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Authorization: persona plus assignment plus scope becomes effective permissions"><title>Authorization: persona plus assignment plus scope becomes effective permissions</title><desc>Permissions follow an IAM-style model. A persona is a reusable bundle of allow and deny statements over actions and resource types. An assignment attaches a persona to a subject, a user or user group, optionally narrowed by a scope. Your effective permissions are the union of the personas from your roles and assignments, with an explicit deny always winning. On every call the server enforces the operation x-fm-permission; no permission returns PermissionDenied 403 and no identity returns Unauthorized 401.</desc><rect width="1230" height="560" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Authorization: who can do what</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Persona plus assignment plus scope becomes your effective permissions, enforced on every call.</text><rect x="60" y="146" width="220" height="124" rx="12" fill="#f0effd" stroke="#6D5AE6" stroke-width="1.5"/><defs><linearGradient id="t170_176" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6D5AE6"/><stop offset="1" stop-color="#5d4dc4"/></linearGradient></defs><rect x="152" y="158" width="36" height="36" rx="8.459999999999999" fill="url(#t170_176)"/><g transform="translate(170,176) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></g><text x="170" y="212" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Persona</text><text x="170" y="234" text-anchor="middle" font-size="12.5" fill="#7C8A9C">allow / deny statements</text><text x="170" y="252" text-anchor="middle" font-size="12.5" fill="#7C8A9C">actions · resource types</text><rect x="60" y="320" width="220" height="124" rx="12" fill="#eff0f3" stroke="#5B6B82" stroke-width="1.5"/><defs><linearGradient id="t170_350" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="152" y="332" width="36" height="36" rx="8.459999999999999" fill="url(#t170_350)"/><g transform="translate(170,350) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g><text x="170" y="386" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">User or user group</text><text x="170" y="408" text-anchor="middle" font-size="12.5" fill="#7C8A9C">the subject</text><text x="170" y="426" text-anchor="middle" font-size="12.5" fill="#7C8A9C">inherited up the tree</text><rect x="340" y="208" width="220" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t450_238" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="432" y="220" width="36" height="36" rx="8.459999999999999" fill="url(#t450_238)"/><g transform="translate(450,238) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r="1"/></g><text x="450" y="274" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Assignment</text><text x="450" y="296" text-anchor="middle" font-size="12.5" fill="#7C8A9C">attaches a persona</text><text x="450" y="314" text-anchor="middle" font-size="12.5" fill="#7C8A9C">to a subject</text><rect x="340" y="388" width="220" height="124" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t450_418" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="432" y="400" width="36" height="36" rx="8.459999999999999" fill="url(#t450_418)"/><g transform="translate(450,418) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></g><text x="450" y="454" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Scope</text><text x="450" y="476" text-anchor="middle" font-size="12.5" fill="#7C8A9C">all · devices · locations</text><text x="450" y="494" text-anchor="middle" font-size="12.5" fill="#7C8A9C">groups · tags · dashboards</text><rect x="640" y="208" width="240" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t760_238" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="742" y="220" width="36" height="36" rx="8.459999999999999" fill="url(#t760_238)"/><g transform="translate(760,238) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></g><text x="760" y="274" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Effective permissions</text><text x="760" y="296" text-anchor="middle" font-size="12.5" fill="#7C8A9C">union of assignments</text><text x="760" y="314" text-anchor="middle" font-size="12.5" fill="#7C8A9C">explicit deny wins</text><rect x="960" y="208" width="210" height="124" rx="12" fill="#eaf5f0" stroke="#2E9E6B" stroke-width="1.5"/><defs><linearGradient id="t1065_238" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="1047" y="220" width="36" height="36" rx="8.459999999999999" fill="url(#t1065_238)"/><g transform="translate(1065,238) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></g><text x="1065" y="274" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Enforced</text><text x="1065" y="296" text-anchor="middle" font-size="12.5" fill="#7C8A9C">on every call</text><text x="1065" y="314" text-anchor="middle" font-size="12.5" fill="#7C8A9C">x-fm-permission</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M280,208 L320,208 L320,250 L340,250" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M280,382 L320,382 L320,290 L340,290" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M450,388 L450,332" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="418.55" y="350" width="62.9" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="450" y="364" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">narrows</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M560,270 L640,270" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M880,270 L960,270" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="615" y="532" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Eight built-in personas: admin · manager · editor · installer · operator · automation_admin · auditor · viewer. A deployment can add its own.</text><text x="615" y="550" text-anchor="middle" font-size="12.5" fill="#7C8A9C">No permission returns PermissionDenied (403); no identity returns Unauthorized (401). A scoped token can only narrow, never grant more.</text></svg>