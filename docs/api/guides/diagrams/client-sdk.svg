<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" width="960" height="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Building a client: generate typed models from the OpenAPI spec and use them over WebSocket or HTTP">
  <title>Building a client from the spec</title>
  <desc>Generate typed models from the OpenAPI spec with openapi-generator, then use the same models over the WebSocket (calls and events) or the HTTP /rpc fallback.</desc>
  <defs>
    <marker id="csN" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8A97A8"/></marker>
    <marker id="csB" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4495D1"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="220" fill="#ffffff"/>

  <path d="M226,100 L280,100" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#csN)"/>
  <path d="M466,100 L520,100" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#csN)"/>
  <path d="M696,86 L750,64" stroke="#4495D1" stroke-width="1.75" fill="none" marker-end="url(#csB)"/>
  <path d="M696,114 L750,140" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#csN)"/>

  <rect x="24" y="62" width="202" height="76" rx="6" fill="#EAF6FD" stroke="#4495D1" stroke-width="1.5"/>
  <text x="125" y="94" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">OpenAPI 3.1 spec</text>
  <text x="125" y="112" text-anchor="middle" font-size="9.5" fill="#3A6B92" font-family="ui-monospace,Menlo,monospace">/api/docs/openapi.json</text>

  <rect x="280" y="62" width="186" height="76" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="373" y="94" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">openapi-generator</text>
  <text x="373" y="112" text-anchor="middle" font-size="10.5" fill="#6B7A90">in your language</text>

  <rect x="520" y="62" width="176" height="76" rx="6" fill="#E4F1FB" stroke="#4495D1" stroke-width="2"/>
  <text x="608" y="94" text-anchor="middle" font-size="12.5" font-weight="700" fill="#122A4F">Typed models</text>
  <text x="608" y="112" text-anchor="middle" font-size="10.5" fill="#6B7A90">params · responses</text>

  <rect x="750" y="40" width="186" height="52" rx="6" fill="#F4F7FB" stroke="#4495D1" stroke-width="1.5"/>
  <text x="843" y="62" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">WebSocket</text>
  <text x="843" y="79" text-anchor="middle" font-size="10.5" fill="#3A6B92">calls + events</text>

  <rect x="750" y="116" width="186" height="52" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="843" y="138" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">HTTP fallback</text>
  <text x="843" y="155" text-anchor="middle" font-size="10.5" fill="#6B7A90" font-family="ui-monospace,Menlo,monospace">POST /rpc</text>

  <text x="480" y="200" text-anchor="middle" font-size="10.5" fill="#8A97A8">The same typed models work over either transport — WebSocket for live, HTTP for single calls.</text>
</svg>
