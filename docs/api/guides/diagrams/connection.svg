<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 680" width="1120" height="680" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Ways in: how each caller connects to Fleet Manager"><title>Ways in: how each caller connects to Fleet Manager</title><desc>Four callers reach Fleet Manager, each with its own token and its own way of sending it. A browser signs in with OIDC and passes its access token as the WebSocket subprotocol on the client socket at wss://host/, a two-way channel that stays open for live events and RPC calls. A mobile app (the Shelly Fleet Assistant) holds a scoped token (a PAT) and sends it as an Authorization Bearer header on that same wss://host/ socket. A server or script uses a PAT as a Bearer header, usually on the HTTP fallback POST /rpc for single calls without events, though it can also use wss://host/ for live events. A Shelly device puts an enrollment token in the query string, or nothing, and connects to wss://host/shelly, an open socket where an unknown device waits in the waiting room until it is accepted. All tokens are verified against Zitadel.</desc><rect width="1120" height="680" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Ways in</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Four callers, three endpoints, and how each one proves who it is.</text><text x="135" y="112" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#7C8A9C">WHO · WHAT TOKEN</text><text x="360" y="112" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#7C8A9C">HOW IT'S SENT</text><text x="822" y="112" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#7C8A9C">WHERE IT LANDS · WHAT YOU GET</text><rect x="540" y="165" width="555" height="512" rx="12" fill="#F4F8FC" stroke="#9DB8D2" stroke-width="1.5" stroke-dasharray="7 5"/><text x="554" y="185" font-size="11" font-weight="600" letter-spacing="0.06em" fill="#5E7A99">FLEET MANAGER</text><rect x="580" y="210" width="475" height="100" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><text x="600" y="240" text-anchor="start" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">wss://host/</text><text x="600" y="262" text-anchor="start" font-size="12.5" fill="#7C8A9C">Client WebSocket · two-way, stays open</text><text x="600" y="280" text-anchor="start" font-size="12.5" fill="#7C8A9C">live events and RPC calls</text><text x="600" y="298" text-anchor="start" font-size="12.5" fill="#7C8A9C">Browser: OIDC · app: PAT</text><rect x="580" y="410" width="475" height="92" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><text x="600" y="440" text-anchor="start" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">POST /rpc</text><text x="600" y="462" text-anchor="start" font-size="12.5" fill="#7C8A9C">HTTP fallback</text><text x="600" y="480" text-anchor="start" font-size="12.5" fill="#7C8A9C">single calls, no events</text><rect x="580" y="540" width="475" height="92" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><text x="600" y="570" text-anchor="start" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">wss://host/shelly</text><text x="600" y="592" text-anchor="start" font-size="12.5" fill="#7C8A9C">Device ingress · open by design</text><text x="600" y="610" text-anchor="start" font-size="12.5" fill="#7C8A9C">unknown device → waiting room</text><text x="817" y="360" text-anchor="middle" font-size="12" font-style="italic" fill="#7C8A9C">a server can also use wss://host/ above for live events</text><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M170,195 L512,195 L512,245 L578,245" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M170,325 L512,325 L512,275 L578,275" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M170,456 L578,456" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><defs><marker id="aC6851B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#C6851B"/></marker></defs><path d="M170,586 L578,586" fill="none" stroke="#C6851B" stroke-width="1.7" marker-end="url(#aC6851B)"/><rect x="300.1" y="185" width="109.8" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="355" y="199" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">as subprotocol</text><rect x="293.4" y="315" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="355" y="329" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">as Bearer header</text><rect x="293.4" y="446" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="355" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">as Bearer header</text><rect x="290.05" y="576" width="129.9" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="355" y="590" text-anchor="middle" font-size="12" font-weight="600" fill="#C6851B">?token=  or  none</text><defs><linearGradient id="t135_195" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="105" y="165" width="60" height="60" rx="14.1" fill="url(#t135_195)"/><g transform="translate(135,195) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="1.6"/><path d="M8 21h8M12 17v4"/></g><text x="135" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Browser</text><text x="135" y="259" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">OIDC access token</text><defs><linearGradient id="t135_325" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="105" y="295" width="60" height="60" rx="14.1" fill="url(#t135_325)"/><g transform="translate(135,325) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2.2"/><path d="M10 18.5h4"/></g><text x="135" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Mobile app</text><text x="135" y="389" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">scoped token (PAT)</text><defs><linearGradient id="t135_456" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="105" y="426" width="60" height="60" rx="14.1" fill="url(#t135_456)"/><g transform="translate(135,456) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="1.6"/><rect x="3" y="13" width="18" height="7" rx="1.6"/><path d="M7 7.5h.01M7 16.5h.01"/></g><text x="135" y="504" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Server / script</text><text x="135" y="520" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">scoped token (PAT)</text><defs><linearGradient id="t135_586" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="105" y="556" width="60" height="60" rx="14.1" fill="url(#t135_586)"/><g transform="translate(135,586) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="1.6"/><rect x="9" y="9" width="6" height="6" rx="1"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></g><text x="135" y="634" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Shelly device</text><text x="135" y="650" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">enrollment token</text></svg>