<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 296" width="780" height="296" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="How clients and devices connect to Fleet Manager">
  <title>Ways in: clients, HTTP fallback, and devices</title>
  <desc>Browsers open the client WebSocket at the root path with the token as a subprotocol; server clients use a bearer token on the root socket or the HTTP /rpc fallback; devices open the /shelly socket with an optional token and are admitted through the waiting room.</desc>
  <defs>
    <marker id="cB" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4495D1"/></marker>
    <marker id="cN" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8A97A8"/></marker>
  </defs>
  <rect x="0" y="0" width="780" height="296" fill="#ffffff"/>

  <!-- FM container -->
  <rect x="432" y="22" width="324" height="252" rx="8" fill="#F8FBFE" stroke="#003C82" stroke-width="1.25" stroke-dasharray="5 4"/>
  <text x="448" y="42" font-size="11" font-weight="600" fill="#003C82">Fleet Manager</text>

  <!-- endpoints -->
  <rect x="452" y="52" width="284" height="54" rx="6" fill="#EAF6FD" stroke="#4495D1" stroke-width="1.5"/>
  <text x="466" y="76" font-size="12.5" font-weight="600" fill="#122A4F" font-family="ui-monospace,Menlo,monospace">wss://host/</text>
  <text x="466" y="94" font-size="11" fill="#6B7A90">client WebSocket · authenticated at upgrade</text>

  <rect x="452" y="118" width="284" height="46" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="466" y="139" font-size="12.5" font-weight="600" fill="#122A4F" font-family="ui-monospace,Menlo,monospace">POST /rpc</text>
  <text x="466" y="155" font-size="11" fill="#6B7A90">HTTP fallback · single calls, no events</text>

  <rect x="452" y="176" width="284" height="66" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="466" y="200" font-size="12.5" font-weight="600" fill="#122A4F" font-family="ui-monospace,Menlo,monospace">wss://host/shelly</text>
  <text x="466" y="217" font-size="11" fill="#6B7A90">device ingress · open socket</text>
  <text x="466" y="232" font-size="11" fill="#8A6100">unknown → waiting room</text>

  <!-- callers -->
  <rect x="28" y="46" width="150" height="54" rx="6" fill="#EAF6FD" stroke="#4495D1" stroke-width="1.5"/>
  <text x="103" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#122A4F">Browser</text>
  <text x="103" y="88" text-anchor="middle" font-size="11" fill="#6B7A90">OIDC sign-in</text>

  <rect x="28" y="122" width="150" height="54" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="103" y="146" text-anchor="middle" font-size="13" font-weight="600" fill="#122A4F">Server / SDK</text>
  <text x="103" y="164" text-anchor="middle" font-size="11" fill="#6B7A90">scoped token</text>

  <rect x="28" y="198" width="150" height="54" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="103" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#122A4F">Shelly device</text>
  <text x="103" y="240" text-anchor="middle" font-size="11" fill="#6B7A90">firmware</text>

  <!-- arrows -->
  <path d="M178,73 L446,76" stroke="#4495D1" stroke-width="1.75" fill="none" marker-end="url(#cB)"/>
  <rect x="238" y="52" width="132" height="15" rx="7" fill="#ffffff"/>
  <text x="304" y="63" text-anchor="middle" font-size="10.5" fill="#2C6C99">token as subprotocol</text>

  <path d="M178,149 L446,141" stroke="#4495D1" stroke-width="1.75" fill="none" marker-end="url(#cB)"/>
  <rect x="250" y="120" width="108" height="15" rx="7" fill="#ffffff"/>
  <text x="304" y="131" text-anchor="middle" font-size="10.5" fill="#2C6C99"><tspan font-family="ui-monospace,Menlo,monospace">Bearer</tspan> token</text>

  <path d="M178,225 L446,210" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#cN)"/>
  <rect x="248" y="216" width="112" height="15" rx="7" fill="#ffffff"/>
  <text x="304" y="227" text-anchor="middle" font-size="10.5" fill="#6B7A90" font-family="ui-monospace,Menlo,monospace">?token= / none</text>
</svg>
