<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 556" width="1140" height="556" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Device admission: how a device becomes accepted, waiting, or denied"><title>Device admission: how a device becomes accepted, waiting, or denied</title><desc>A device connects to /shelly. Fleet Manager checks how it is secured and decides. A device with a known token or certificate that matches its own id is accepted straight away and can be controlled. A new or enrolling device goes to the waiting room, where it is read-only until an operator accepts it. A device with a bad or expired credential, or the wrong id, is denied and its socket is closed. From the waiting room an operator accepts the device, which allows control, or rejects it, which denies it. On reconnect a trusted device skips the wait and a denied device stays denied. Too many connections at once are throttled at the gate, not denied. The three record states are PENDING, ALLOWED, and DENIED.</desc><rect width="1140" height="556" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Device admission: the waiting room</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">A new device is read-only until an operator accepts it. Only then is it written to the database.</text><circle cx="32" cy="277" r="6" fill="#25324A"/><rect x="56" y="214" width="210" height="126" rx="12" fill="#eff0f3" stroke="#5B6B82" stroke-width="1.5"/><defs><linearGradient id="t161_244" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="143" y="226" width="36" height="36" rx="8.459999999999999" fill="url(#t161_244)"/><g transform="translate(161,244) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-5M9 8V2M15 8V2M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></g><text x="161" y="280" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Device connects</text><text x="161" y="302" text-anchor="middle" font-size="12.5" fill="#7C8A9C">it opens a socket</text><text x="161" y="320" text-anchor="middle" font-size="12.5" fill="#7C8A9C">at /shelly</text><rect x="430" y="214" width="230" height="126" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t545_244" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="527" y="226" width="36" height="36" rx="8.459999999999999" fill="url(#t545_244)"/><g transform="translate(545,244) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></g><text x="545" y="280" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Waiting room</text><text x="545" y="302" text-anchor="middle" font-size="12.5" fill="#7C8A9C">PENDING</text><text x="545" y="320" text-anchor="middle" font-size="12.5" fill="#7C8A9C">read-only, no control</text><rect x="840" y="66" width="250" height="126" rx="12" fill="#eaf5f0" stroke="#2E9E6B" stroke-width="1.5"/><defs><linearGradient id="t965_96" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="947" y="78" width="36" height="36" rx="8.459999999999999" fill="url(#t965_96)"/><g transform="translate(965,96) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></g><text x="965" y="132" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Accepted</text><text x="965" y="154" text-anchor="middle" font-size="12.5" fill="#7C8A9C">ALLOWED</text><text x="965" y="172" text-anchor="middle" font-size="12.5" fill="#7C8A9C">can be controlled</text><rect x="840" y="382" width="250" height="126" rx="12" fill="#f9edec" stroke="#C24A3D" stroke-width="1.5"/><defs><linearGradient id="t965_412" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C24A3D"/><stop offset="1" stop-color="#a53f34"/></linearGradient></defs><rect x="947" y="394" width="36" height="36" rx="8.459999999999999" fill="url(#t965_412)"/><g transform="translate(965,412) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></g><text x="965" y="448" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Denied</text><text x="965" y="470" text-anchor="middle" font-size="12.5" fill="#7C8A9C">DENIED</text><text x="965" y="488" text-anchor="middle" font-size="12.5" fill="#7C8A9C">connection closed</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M44,277 L56,277" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M161,214 L161,129 L840,129" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M266,277 L430,277" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M161,340 L161,445 L840,445" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a2E9E6B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2E9E6B"/></marker></defs><path d="M545,214 L545,165 L840,165" fill="none" stroke="#2E9E6B" stroke-width="1.7" marker-end="url(#a2E9E6B)"/><defs><marker id="aC24A3D" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#C24A3D"/></marker></defs><path d="M545,340 L545,409 L840,409" fill="none" stroke="#C24A3D" stroke-width="1.7" marker-end="url(#aC24A3D)"/><text x="500" y="119" text-anchor="middle" font-size="12" fill="#7C8A9C">a known token or cert for this device</text><rect x="286.4" y="267" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="348" y="281" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">new or enrolling</text><text x="500" y="435" text-anchor="middle" font-size="12" fill="#7C8A9C">a bad or expired credential, or the wrong id</text><text x="700" y="155" text-anchor="middle" font-size="12" font-weight="600" fill="#2E9E6B">operator accepts</text><text x="700" y="399" text-anchor="middle" font-size="12" font-weight="600" fill="#C24A3D">operator rejects</text><text x="440" y="530" text-anchor="middle" font-size="12.5" fill="#7C8A9C">On reconnect a trusted device skips the wait; a denied device stays denied.</text><text x="440" y="548" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Too many connections at once are throttled at the gate, not denied.</text></svg>