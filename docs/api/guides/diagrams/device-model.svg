<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 700" width="1360" height="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The device model: the device says what it can do, and there are three ways to act on it"><title>The device model: the device says what it can do, and there are three ways to act on it</title><desc>The Shelly device says what it can do. Fleet Manager reads that and tidies it into a ready-to-use list. There are three ways to act on a device. The first is simple commands that work on any device, like on, off, open, and dim. The second is the device own commands, which give more control and reach settings. The third is a raw command for advanced cases. All three become one command to the device, which is checked and logged. A device is physical, bluetooth, or a virtual one.</desc><rect width="1360" height="700" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">The device model</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">The device says what it can do. Fleet Manager tidies it up. Then you act on it, three ways.</text><rect x="60" y="110" width="210" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t165_140" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="147" y="122" width="36" height="36" rx="8.459999999999999" fill="url(#t165_140)"/><g transform="translate(165,140) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></g><text x="165" y="176" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Device</text><text x="165" y="198" text-anchor="middle" font-size="12.5" fill="#7C8A9C">one id: shellyID</text><text x="165" y="216" text-anchor="middle" font-size="12.5" fill="#7C8A9C">nothing else to track</text><rect x="430" y="110" width="230" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t545_140" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="527" y="122" width="36" height="36" rx="8.459999999999999" fill="url(#t545_140)"/><g transform="translate(545,140) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10 22V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1z"/><rect width="8" height="8" x="14" y="2" rx="1"/></g><text x="545" y="176" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Components</text><text x="545" y="198" text-anchor="middle" font-size="12.5" fill="#7C8A9C">what the device can do</text><text x="545" y="216" text-anchor="middle" font-size="12.5" fill="#7C8A9C">found automatically</text><rect x="820" y="110" width="220" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t930_140" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="912" y="122" width="36" height="36" rx="8.459999999999999" fill="url(#t930_140)"/><g transform="translate(930,140) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></g><text x="930" y="176" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Entities</text><text x="930" y="198" text-anchor="middle" font-size="12.5" fill="#7C8A9C">the same list, tidied up</text><text x="930" y="216" text-anchor="middle" font-size="12.5" fill="#7C8A9C">ready to use</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M270,172 L430,172" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="288.4" y="162" width="123.2" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="350" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">reads the device</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M660,172 L820,172" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="701.85" y="162" width="76.30000000000001" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="740" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#7C8A9C">tidied up</text><text x="660" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#25324A">Three ways to act on a device</text><text x="660" y="336" text-anchor="middle" font-size="12" fill="#7C8A9C">easy and works everywhere  ·  more control  ·  raw</text><rect x="60" y="356" width="360" height="124" rx="12" fill="#eaf5f0" stroke="#2E9E6B" stroke-width="1.5"/><defs><linearGradient id="t240_386" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="222" y="368" width="36" height="36" rx="8.459999999999999" fill="url(#t240_386)"/><g transform="translate(240,386) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></g><text x="240" y="422" text-anchor="middle" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">Entity.InvokeAction</text><text x="240" y="444" text-anchor="middle" font-size="12.5" fill="#7C8A9C">simple commands for any device</text><text x="240" y="462" text-anchor="middle" font-size="12.5" fill="#7C8A9C">on, off, open, dim</text><rect x="500" y="356" width="340" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t670_386" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="652" y="368" width="36" height="36" rx="8.459999999999999" fill="url(#t670_386)"/><g transform="translate(670,386) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></g><text x="670" y="422" text-anchor="middle" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">&lt;Component&gt;.Method</text><text x="670" y="444" text-anchor="middle" font-size="12.5" fill="#7C8A9C">the device’s own commands</text><text x="670" y="462" text-anchor="middle" font-size="12.5" fill="#7C8A9C">more control, and settings</text><rect x="920" y="356" width="340" height="124" rx="12" fill="#eff0f3" stroke="#5B6B82" stroke-width="1.5"/><defs><linearGradient id="t1090_386" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="1072" y="368" width="36" height="36" rx="8.459999999999999" fill="url(#t1090_386)"/><g transform="translate(1090,386) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m4 17 6-6-6-6"/><path d="M12 19h8"/></g><text x="1090" y="422" text-anchor="middle" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">Device.Call</text><text x="1090" y="444" text-anchor="middle" font-size="12.5" fill="#7C8A9C">a raw command</text><text x="1090" y="462" text-anchor="middle" font-size="12.5" fill="#7C8A9C">only if you must</text><rect x="480" y="580" width="400" height="92" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t680_610" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="662" y="592" width="36" height="36" rx="8.459999999999999" fill="url(#t680_610)"/><g transform="translate(680,610) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></g><text x="680" y="646" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">One command to the device</text><text x="680" y="668" text-anchor="middle" font-size="12.5" fill="#7C8A9C">checked and logged</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M240,480 L240,542 L590,542 L590,580" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M670,480 L670,580" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M1090,480 L1090,542 L770,542 L770,580" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="680" y="694" text-anchor="middle" font-size="12.5" fill="#7C8A9C">A device is physical, bluetooth, or a virtual one (extracted, composed, or connector).</text></svg>