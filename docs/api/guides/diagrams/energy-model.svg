<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 470" width="1480" height="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The energy model: from device meters to the meaning you set"><title>The energy model: from device meters to the meaning you set</title><desc>Fleet Manager auto-detects the facts and you add the meaning. A device is a physical Shelly. Its metering parts are the EM (three-phase), EM1 (single-phase), and PM1 components. Each gives measurement points, one reading on a channel like em:0.a_total_act_energy, carrying facts such as phase and electricalDomain. A logical meter is the meaning you give it: a physical meter sums its points, or a calculated meter is a formula over other meters, and it carries a role like grid, pv, or battery. A group or location says where it belongs. You read it all with Energy.Query, grouped by meter, role, kind, or utility.</desc><rect width="1480" height="470" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">The energy model</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Auto-detected facts on the left become the meaning you set on the right.</text><text x="425" y="96" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.05em" fill="#2F6FB0">FACTS · AUTO-DETECTED</text><text x="1120" y="96" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.05em" fill="#6D5AE6">MEANING · YOU SET</text><rect x="50" y="150" width="180" height="148" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t140_180" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="122" y="162" width="36" height="36" rx="8.459999999999999" fill="url(#t140_180)"/><g transform="translate(140,180) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></g><text x="140" y="216" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Device</text><text x="140" y="238" text-anchor="middle" font-size="12.5" fill="#7C8A9C">a physical Shelly</text><text x="140" y="256" text-anchor="middle" font-size="12.5" fill="#7C8A9C">model, app, profile</text><rect x="270" y="150" width="220" height="148" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t380_180" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="362" y="162" width="36" height="36" rx="8.459999999999999" fill="url(#t380_180)"/><g transform="translate(380,180) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></g><text x="380" y="216" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Meter parts</text><text x="380" y="238" text-anchor="middle" font-size="12.5" fill="#7C8A9C">EM · EM1 · PM1</text><text x="380" y="256" text-anchor="middle" font-size="12.5" fill="#7C8A9C">the metering components</text><rect x="530" y="150" width="270" height="148" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t665_180" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="647" y="162" width="36" height="36" rx="8.459999999999999" fill="url(#t665_180)"/><g transform="translate(665,180) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></g><text x="665" y="216" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Measurement point</text><text x="665" y="238" text-anchor="middle" font-size="12.5" fill="#7C8A9C">one reading on a channel</text><text x="665" y="256" text-anchor="middle" font-size="12.5" fill="#7C8A9C">em:0.a_total_act_energy</text><path d="M830,128 L830,330" fill="none" stroke="#7C8A9C" stroke-width="1.7" stroke-dasharray="5 4"/><rect x="870" y="150" width="320" height="148" rx="12" fill="#f0effd" stroke="#6D5AE6" stroke-width="1.5"/><defs><linearGradient id="t1030_180" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6D5AE6"/><stop offset="1" stop-color="#5d4dc4"/></linearGradient></defs><rect x="1012" y="162" width="36" height="36" rx="8.459999999999999" fill="url(#t1030_180)"/><g transform="translate(1030,180) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/></g><text x="1030" y="216" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Logical meter</text><text x="1030" y="238" text-anchor="middle" font-size="12.5" fill="#7C8A9C">physical: sums its points, or</text><text x="1030" y="256" text-anchor="middle" font-size="12.5" fill="#7C8A9C">calculated: a formula</text><text x="1030" y="274" text-anchor="middle" font-size="12.5" fill="#7C8A9C">role: grid, pv, battery</text><rect x="1230" y="150" width="200" height="148" rx="12" fill="#f0effd" stroke="#6D5AE6" stroke-width="1.5"/><defs><linearGradient id="t1330_180" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6D5AE6"/><stop offset="1" stop-color="#5d4dc4"/></linearGradient></defs><rect x="1312" y="162" width="36" height="36" rx="8.459999999999999" fill="url(#t1330_180)"/><g transform="translate(1330,180) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></g><text x="1330" y="216" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Group / location</text><text x="1330" y="238" text-anchor="middle" font-size="12.5" fill="#7C8A9C">where it belongs</text><text x="1330" y="256" text-anchor="middle" font-size="12.5" fill="#7C8A9C">site, building, tenant</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M230,224 L270,224" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M490,224 L530,224" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M800,224 L870,224" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M1190,224 L1230,224" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="740" y="424" text-anchor="middle" font-size="12.5" fill="#7C8A9C">electricalDomain (ac_mains, dc_pv, dc_battery) is physics, a fact. role (grid, pv, battery) is meaning, and you set it.</text><text x="740" y="446" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Read it with Energy.Query, grouped by meter, role, kind, or utility.</text></svg>