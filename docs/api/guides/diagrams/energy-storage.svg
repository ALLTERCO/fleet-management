<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Where energy data is kept: live in memory, a one-month raw window, and the durable 15-minute rollup"><title>Where energy data is kept: live in memory, a one-month raw window, and the durable 15-minute rollup</title><desc>Device readings arrive over NotifyStatus. The newest value stays live in memory with no database. Raw full-resolution stats are a hot window kept about one month, then dropped. The durable long-term store is the 15-minute rollup: it holds all history and billing, and the app and reports read it.</desc><rect width="820" height="600" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Where energy data is kept</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Live in memory, a one-month raw window, and the 15-minute rollup as the durable long-term store.</text><rect x="60" y="230" width="250" height="150" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t185_260" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="167" y="242" width="36" height="36" rx="8.459999999999999" fill="url(#t185_260)"/><g transform="translate(185,260) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></g><text x="185" y="296" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Device readings</text><text x="185" y="318" text-anchor="middle" font-size="12.5" fill="#7C8A9C">from NotifyStatus</text><text x="185" y="336" text-anchor="middle" font-size="12.5" fill="#7C8A9C">raw device status</text><rect x="400" y="100" width="360" height="110" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t580_130" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="562" y="112" width="36" height="36" rx="8.459999999999999" fill="url(#t580_130)"/><g transform="translate(580,130) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></g><text x="580" y="166" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Live status</text><text x="580" y="188" text-anchor="middle" font-size="12.5" fill="#7C8A9C">the newest value · in memory, no DB</text><rect x="400" y="250" width="360" height="110" rx="12" fill="#eff0f3" stroke="#5B6B82" stroke-width="1.5"/><defs><linearGradient id="t580_280" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="562" y="262" width="36" height="36" rx="8.459999999999999" fill="url(#t580_280)"/><g transform="translate(580,280) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></g><text x="580" y="316" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Raw stats</text><text x="580" y="338" text-anchor="middle" font-size="12.5" fill="#7C8A9C">full detail · ~1 month, then dropped</text><rect x="400" y="400" width="360" height="120" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t580_430" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="562" y="412" width="36" height="36" rx="8.459999999999999" fill="url(#t580_430)"/><g transform="translate(580,430) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></g><text x="580" y="466" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">15-minute rollup</text><text x="580" y="488" text-anchor="middle" font-size="12.5" fill="#7C8A9C">the durable long-term store</text><text x="580" y="506" text-anchor="middle" font-size="12.5" fill="#7C8A9C">all history and billing</text><rect x="648.5" y="402" width="83" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="690" y="416" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">main store</text><path d="M310,305 L360,305" fill="none" stroke="#7C8A9C" stroke-width="1.7"/><path d="M360,155 L360,460" fill="none" stroke="#7C8A9C" stroke-width="1.7"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M360,155 L400,155" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M360,305 L400,305" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M360,460 L400,460" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="410" 