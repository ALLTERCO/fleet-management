<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 340" width="1400" height="340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Entities: the shape, then discover its actions, then run one"><title>Entities: the shape, then discover its actions, then run one</title><desc>An entity is Fleet Manager’s normalized view of one part of a device, with the fields id, name, type, source, online, and properties; the id looks like shellyID_channel:type. First call Entity.GetCapabilities to list the actions the entity supports, only the ones the device’s own methods allow, and Entity.GetActionSchema for one action’s params. Then call Entity.InvokeAction to run one of those actions, for example toggle, which the backend maps to the device RPC such as Switch.Toggle. The action you run must be one that GetCapabilities listed. Configuration is changed on the component itself, such as Switch.SetConfig.</desc><rect width="1400" height="340" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Anatomy of an entity</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">One typed shape. Discover its actions with GetCapabilities, then run one.</text><rect x="50" y="100" width="400" height="170" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t250_130" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="232" y="112" width="36" height="36" rx="8.459999999999999" fill="url(#t250_130)"/><g transform="translate(250,130) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></g><text x="250" y="166" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">An entity</text><text x="250" y="188" text-anchor="middle" font-size="12.5" fill="#7C8A9C">id, name, type, source,</text><text x="250" y="206" text-anchor="middle" font-size="12.5" fill="#7C8A9C">online, and properties</text><text x="250" y="224" text-anchor="middle" font-size="12.5" fill="#7C8A9C">id like shellyplus…_0:out</text><rect x="500" y="100" width="400" height="170" rx="12" fill="#eaf5f0" stroke="#2E9E6B" stroke-width="1.5"/><defs><linearGradient id="t700_130" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="682" y="112" width="36" height="36" rx="8.459999999999999" fill="url(#t700_130)"/><g transform="translate(700,130) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h.01M3 12h.01M3 19h.01M8 5h13M8 12h13M8 19h13"/></g><text x="700" y="166" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">What can it do?</text><text x="700" y="188" text-anchor="middle" font-size="12.5" fill="#7C8A9C">GetCapabilities lists its actions,</text><text x="700" y="206" text-anchor="middle" font-size="12.5" fill="#7C8A9C">only the ones the device allows.</text><text x="700" y="224" text-anchor="middle" font-size="12.5" fill="#7C8A9C">GetActionSchema gives the params.</text><rect x="950" y="100" width="400" height="170" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t1150_130" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="1132" y="112" width="36" height="36" rx="8.459999999999999" fill="url(#t1150_130)"/><g transform="translate(1150,130) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></g><text x="1150" y="166" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Run one</text><text x="1150" y="188" text-anchor="middle" font-size="12.5" fill="#7C8A9C">InvokeAction runs one action,</text><text x="1150" y="206" text-anchor="middle" font-size="12.5" fill="#7C8A9C">for example { action: "toggle" },</text><text x="1150" y="224" text-anchor="middle" font-size="12.5" fill="#7C8A9C">mapped to Switch.Toggle.</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M450,185 L500,185" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M900,185 L950,185" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="475" y="175" text-anchor="middle" font-size="11.5" fill="#7C8A9C">then</text><text x="925" y="175" text-anchor="middle" font-size="11.5" fill="#7C8A9C">then</text><text x="700" y="314" text-anchor="middle" font-size="11.5" fill="#7C8A9C">The action you run must be one GetCapabilities listed. Change configuration on the component (Switch.SetConfig).</text></svg>