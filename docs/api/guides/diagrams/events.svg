<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 668" width="980" height="668" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Events: subscribe, receive, and replay after a reconnect"><title>Events: subscribe, receive, and replay after a reconnect</title><desc>Events are opt-in over the WebSocket. The client calls system.Subscribe with the event names it wants; Fleet Manager replies with listener ids and a connectionId. Events then push as they happen, each carrying a streamId, the client keeps the last one it handled. When the connection drops, the client reconnects, signs in, and subscribes again, this time sending the connectionId and its last lastSeenStreamId. Fleet Manager replays the events that were missed, or tells the client to refetch with resyncRequired.</desc><rect width="980" height="668" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Events: subscribe, receive, replay</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Subscribe once; the server pushes updates; after a reconnect it replays what you missed.</text><line x1="210" y1="196" x2="210" y2="618" stroke="#c4cad2" stroke-width="1.5" stroke-dasharray="3 5"/><line x1="770" y1="196" x2="770" y2="618" stroke="#c4cad2" stroke-width="1.5" stroke-dasharray="3 5"/><defs><linearGradient id="t210_120" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="184" y="94" width="52" height="52" rx="12.219999999999999" fill="url(#t210_120)"/><g transform="translate(210,120) scale(0.8666666666666667) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="1.6"/><path d="M8 21h8M12 17v4"/></g><text x="210" y="164" text-anchor="middle" font-size="12.5" font-weight="600" fill="#25324A">Client</text><defs><linearGradient id="t770_120" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="744" y="94" width="52" height="52" rx="12.219999999999999" fill="url(#t770_120)"/><g transform="translate(770,120) scale(0.8666666666666667) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4.5l3-8 5 16 3-8H21"/></g><text x="770" y="164" text-anchor="middle" font-size="12.5" font-weight="600" fill="#25324A">Fleet Manager</text><text x="210" y="182" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">"my-client"</text><text x="770" y="182" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">"FLEET_MANAGER"</text><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M238,235 L742,235" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><circle cx="250" cy="222" r="9" fill="#2F6FB0"/><text x="250" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text><text x="490" y="227" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">system.Subscribe · events</text><defs><marker id="a2E9E6B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2E9E6B"/></marker></defs><path d="M742,292 L238,292" fill="none" stroke="#2E9E6B" stroke-width="1.7" marker-end="url(#a2E9E6B)"/><circle cx="730" cy="279" r="9" fill="#2E9E6B"/><text x="730" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text><text x="490" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">ids + connectionId</text><defs><marker id="a4F5D95" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4F5D95"/></marker></defs><path d="M742,365 L238,365" fill="none" stroke="#4F5D95" stroke-width="1.7" marker-end="url(#a4F5D95)"/><circle cx="730" cy="352" r="9" fill="#4F5D95"/><text x="730" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text><text x="490" y="357" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">event push · streamId</text><text x="490" y="342" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7C8A9C">keep the last streamId you handled</text><path d="M180,430 L800,430" fill="none" stroke="#C6851B" stroke-width="1.7" stroke-dasharray="5 4"/><rect x="341.29999999999995" y="420" width="297.40000000000003" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="490" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#C6851B">4 · connection drops → reconnect + sign in</text><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M238,510 L742,510" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><circle cx="250" cy="497" r="9" fill="#2F6FB0"/><text x="250" y="501" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text><text x="490" y="502" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">system.Subscribe · connectionId + lastSeenStreamId</text><defs><marker id="a2E9E6B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2E9E6B"/></marker></defs><path d="M742,575 L238,575" fill="none" stroke="#2E9E6B" stroke-width="1.7" marker-end="url(#a2E9E6B)"/><circle cx="730" cy="562" r="9" fill="#2E9E6B"/><text x="730" y="566" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">6</text><text x="490" y="567" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">replay the missed events</text><text x="490" y="600" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7C8A9C">or resyncRequired → refetch the current state</text><text x="490" y="648" text-anchor="middle" font-size="12" fill="#7C8A9C">a frame's <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">src</tspan> and <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">dst</tspan> are these two names; the arrow points from <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">src</tspan> to <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">dst</tspan></text></svg>