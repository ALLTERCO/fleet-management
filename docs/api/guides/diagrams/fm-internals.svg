<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 730" width="1120" height="730" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Inside Fleet Manager: transport, dispatch, domain, and platform"><title>Inside Fleet Manager: transport, dispatch, domain, and platform</title><desc>A call enters through the transport layer (the WebSocket controller or the HTTP /rpc endpoint), is dispatched by the Commander which routes the RPC and audits it, then runs in a domain module: devices and entities, the waiting room, the alert engine, or energy. Each of those modules checks its own per-method permission against the authz resolver during dispatch. Modules lean on platform services: the event distributor for session streams and replay, the delivery outbox for notification channels and retries, and the authz resolver for personas and assignments. State is persisted in TimescaleDB and streamed and cached via Redis.</desc><rect width="1120" height="730" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Inside Fleet Manager</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">One call’s path: transport → dispatch → domain module → platform service.</text><text x="1085" y="134" text-anchor="end" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#7C8A9C">TRANSPORT</text><text x="1085" y="282" text-anchor="end" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#7C8A9C">DISPATCH</text><text x="1085" y="446" text-anchor="end" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#7C8A9C">DOMAIN</text><text x="1085" y="610" text-anchor="end" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#7C8A9C">PLATFORM</text><rect x="250" y="92" width="232" height="98" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t366_122" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="348" y="104" width="36" height="36" rx="8.459999999999999" fill="url(#t366_122)"/><g transform="translate(366,122) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></g><text x="366" y="158" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">WebSocket controller</text><rect x="512" y="92" width="232" height="98" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t628_122" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="610" y="104" width="36" height="36" rx="8.459999999999999" fill="url(#t628_122)"/><g transform="translate(628,122) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></g><text x="628" y="158" text-anchor="middle" font-size="15" font-weight="700" font-family="ui-monospace,Menlo,monospace" fill="#25324A">HTTP · /rpc</text><rect x="340" y="232" width="322" height="112" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t501_262" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="483" y="244" width="36" height="36" rx="8.459999999999999" fill="url(#t501_262)"/><g transform="translate(501,262) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></g><text x="501" y="298" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Commander</text><text x="501" y="320" text-anchor="middle" font-size="12.5" fill="#7C8A9C">routes RPC · audits</text><rect x="40" y="396" width="214" height="112" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t147_426" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="129" y="408" width="36" height="36" rx="8.459999999999999" fill="url(#t147_426)"/><g transform="translate(147,426) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></g><text x="147" y="462" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Devices &amp; entities</text><text x="147" y="484" text-anchor="middle" font-size="12.5" fill="#7C8A9C">components · composer</text><rect x="268" y="396" width="214" height="112" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t375_426" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="357" y="408" width="36" height="36" rx="8.459999999999999" fill="url(#t375_426)"/><g transform="translate(375,426) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></g><text x="375" y="462" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Waiting room</text><text x="375" y="484" text-anchor="middle" font-size="12.5" fill="#7C8A9C">device ingress</text><rect x="496" y="396" width="214" height="112" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t603_426" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="585" y="408" width="36" height="36" rx="8.459999999999999" fill="url(#t603_426)"/><g transform="translate(603,426) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18v-6a5 5 0 1 1 10 0v6"/><path d="M5 21a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-1a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2z"/><path d="M21 12h1M18.5 4.5 18 5M2 12h1M12 2v1M4.929 4.929l.707.707M12 12v6"/></g><text x="603" y="462" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Alert engine</text><text x="603" y="484" text-anchor="middle" font-size="12.5" fill="#7C8A9C">evaluators · sweep</text><rect x="724" y="396" width="214" height="112" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t831_426" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="813" y="408" width="36" height="36" rx="8.459999999999999" fill="url(#t831_426)"/><g transform="translate(831,426) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></g><text x="831" y="462" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Energy</text><text x="831" y="484" text-anchor="middle" font-size="12.5" fill="#7C8A9C">meters · rollups</text><rect x="96" y="560" width="250" height="112" rx="12" fill="#edeff4" stroke="#4F5D95" stroke-width="1.5"/><defs><linearGradient id="t221_590" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4F5D95"/><stop offset="1" stop-color="#434f7f"/></linearGradient></defs><rect x="203" y="572" width="36" height="36" rx="8.459999999999999" fill="url(#t221_590)"/><g transform="translate(221,590) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"/><path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"/><circle cx="12" cy="9" r="2"/><path d="M16.2 4.8c2 2 2.26 5.11.8 7.47"/><path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"/><path d="M9.5 18h5"/><path d="m8 22 4-11 4 11"/></g><text x="221" y="626" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Event distributor</text><text x="221" y="648" text-anchor="middle" font-size="12.5" fill="#7C8A9C">session streams · replay</text><rect x="376" y="560" width="250" height="112" rx="12" fill="#edeff4" stroke="#4F5D95" stroke-width="1.5"/><defs><linearGradient id="t501_590" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4F5D95"/><stop offset="1" stop-color="#434f7f"/></linearGradient></defs><rect x="483" y="572" width="36" height="36" rx="8.459999999999999" fill="url(#t501_590)"/><g transform="translate(501,590) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></g><text x="501" y="626" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Delivery outbox</text><text x="501" y="648" text-anchor="middle" font-size="12.5" fill="#7C8A9C">channels · retries</text><rect x="656" y="560" width="250" height="112" rx="12" fill="#edeff4" stroke="#4F5D95" stroke-width="1.5"/><defs><linearGradient id="t781_590" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4F5D95"/><stop offset="1" stop-color