<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 860" width="1240" height="860" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Anatomy of a frame: request, success reply, error reply, and server push"><title>Anatomy of a frame: request, success reply, error reply, and server push</title><desc>One connection carries four kinds of message, and the id tells a reply apart from a push. A request has an id you choose, a src naming your client, a dst of FLEET_MANAGER or a device id, a method, and params. A success reply comes back with the same id and the answer in result. An error reply comes back with the same id but an error object with a code and message instead of result. All three carry jsonrpc 2.0. A server push has no id and no jsonrpc: the server sends it on its own with method NotifyStatus, a dst of FM_CLIENT, and a streamId you can save to catch up later.</desc><rect width="1240" height="860" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Anatomy of a frame</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">One connection carries four kinds of message. The id tells a reply apart from a push.</text><rect x="60" y="130" width="1120" height="150" rx="12" fill="#FBFCFE" stroke="#E4EBF3" stroke-width="1"/><rect x="60" y="130" width="6" height="150" rx="3" fill="#2F6FB0"/><circle cx="98" cy="172" r="7" fill="#2F6FB0"/><text x="118" y="177"><tspan font-size="16" font-weight="700" fill="#25324A">Request</tspan><tspan font-size="13.5" fill="#7C8A9C">   ·   you → Fleet Manager</tspan></text><rect x="1083" y="152" width="73" height="26" rx="13" fill="#e2ebf4"/><text x="1119.5" y="169" text-anchor="middle" font-size="12" font-weight="700" fill="#2F6FB0">request</text><text x="118" y="222" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#25324A">{ "jsonrpc": "2.0", <tspan font-weight="700" fill="#2F6FB0">"id": 1</tspan>, "src": "my-client", <tspan font-weight="700" fill="#2F6FB0">"dst": "FLEET_MANAGER"</tspan>, "method": "device.List", "params": {} }</text><text x="118" y="252" font-size="12.5" fill="#7C8A9C">You choose the <tspan font-family="ui-monospace,Menlo,monospace">id</tspan> and <tspan font-family="ui-monospace,Menlo,monospace">src</tspan>. Send <tspan font-family="ui-monospace,Menlo,monospace">dst</tspan> as FLEET_MANAGER, or a device id to reach that device.</text><rect x="60" y="310" width="1120" height="150" rx="12" fill="#FBFCFE" stroke="#E4EBF3" stroke-width="1"/><rect x="60" y="310" width="6" height="150" rx="3" fill="#2E9E6B"/><circle cx="98" cy="352" r="7" fill="#2E9E6B"/><text x="118" y="357"><tspan font-size="16" font-weight="700" fill="#25324A">Success reply</tspan><tspan font-size="13.5" fill="#7C8A9C">   ·   Fleet Manager → you</tspan></text><rect x="1006" y="332" width="150" height="26" rx="13" fill="#e2f1ea"/><text x="1081" y="349" text-anchor="middle" font-size="12" font-weight="700" fill="#2E9E6B">reply · id-matched</text><text x="118" y="402" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#25324A">{ "jsonrpc": "2.0", <tspan font-weight="700" fill="#2E9E6B">"id": 1</tspan>, "src": "FLEET_MANAGER", "dst": "my-client", <tspan font-weight="700" fill="#2E9E6B">"result"</tspan>: { … } }</text><text x="118" y="432" font-size="12.5" fill="#7C8A9C">The <tspan font-family="ui-monospace,Menlo,monospace">id</tspan> matches your request, so this is its reply. The answer is in <tspan font-family="ui-monospace,Menlo,monospace">result</tspan>.</text><rect x="60" y="490" width="1120" height="150" rx="12" fill="#FBFCFE" stroke="#E4EBF3" stroke-width="1"/><rect x="60" y="490" width="6" height="150" rx="3" fill="#C24A3D"/><circle cx="98" cy="532" r="7" fill="#C24A3D"/><text x="118" y="537"><tspan font-size="16" font-weight="700" fill="#25324A">Error reply</tspan><tspan font-size="13.5" fill="#7C8A9C">   ·   Fleet Manager → you</tspan></text><rect x="1006" y="512" width="150" height="26" rx="13" fill="#f6e6e4"/><text x="1081" y="529" text-anchor="middle" font-size="12" font-weight="700" fill="#C24A3D">reply · id-matched</text><text x="118" y="582" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#25324A">{ "jsonrpc": "2.0", <tspan font-weight="700" fill="#C24A3D">"id": 1</tspan>, "src": "FLEET_MANAGER", "dst": "my-client", <tspan font-weight="700" fill="#C24A3D">"error"</tspan>: { "code": -32601, "message": "…" } }</text><text x="118" y="612" font-size="12.5" fill="#7C8A9C">Same <tspan font-family="ui-monospace,Menlo,monospace">id</tspan>, but you get <tspan font-family="ui-monospace,Menlo,monospace">error</tspan> instead of <tspan font-family="ui-monospace,Menlo,monospace">result</tspan>: here <tspan font-family="ui-monospace,Menlo,monospace">code</tspan> -32601, <tspan font-family="ui-monospace,Menlo,monospace">message</tspan> "Method not found".</text><rect x="60" y="670" width="1120" height="150" rx="12" fill="#FBFCFE" stroke="#E4EBF3" stroke-width="1"/><rect x="60" y="670" width="6" height="150" rx="3" fill="#6D5AE6"/><circle cx="98" cy="712" r="7" fill="#6D5AE6"/><text x="118" y="717"><tspan font-size="16" font-weight="700" fill="#25324A">Server push</tspan><tspan font-size="13.5" fill="#7C8A9C">   ·   Fleet Manager → you</tspan></text><rect x="1048" y="692" width="108" height="26" rx="13" fill="#ebe8fc"/><text x="1102" y="709" text-anchor="middle" font-size="12" font-weight="700" fill="#6D5AE6">push · no id</text><text x="118" y="762" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#25324A">{ "src": "FLEET_MANAGER", "dst": "FM_CLIENT", <tspan font-weight="700" fill="#6D5AE6">"method": "NotifyStatus"</tspan>, "params": { "ts": …, … }, <tspan font-weight="700" fill="#6D5AE6">"streamId"</tspan>: "1783…-0" }</text><text x="118" y="792" font-size="12.5" fill="#7C8A9C">No <tspan font-family="ui-monospace,Menlo,monospace">id</tspan> and no <tspan font-family="ui-monospace,Menlo,monospace">jsonrpc</tspan>: the server sends this on its own, any time. <tspan font-family="ui-monospace,Menlo,monospace">dst</tspan> is FM_CLIENT, not your id. Save the last <tspan font-family="ui-monospace,Menlo,monospace">streamId</tspan> to catch up.</text><text x="620" y="846" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Every request and reply carries "jsonrpc": "2.0". Only the server push leaves it out.</text></svg>