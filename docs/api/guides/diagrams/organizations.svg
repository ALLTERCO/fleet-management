<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 610" width="980" height="610" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Organizations and locations, with a real example"><title>Organizations and locations, with a real example</title><desc>Take a facilities company, Acme Facilities. It is the organization and owns everything. Location is the top-level place hierarchy: an AC unit lives at HQ, Block A, Floor 2, Room 204, which are 4 of the 14 location kinds from continent down to zone. On top of location, groups and tags give other ways to reach the same device. The AC unit is in the Meeting-room ACs group, so you can act on every AC together even though they are in different rooms. It is also tagged critical, which marks important devices wherever they are. Each is a different way to find and scope the same device.</desc><rect width="980" height="610" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Organizations and locations</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Example: Acme Facilities and one AC unit. Location says where it is; groups and tags are other ways to reach it.</text><rect x="130" y="96" width="320" height="96" rx="12" fill="#f0effd" stroke="#6D5AE6" stroke-width="1.5"/><defs><linearGradient id="t290_126" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6D5AE6"/><stop offset="1" stop-color="#5d4dc4"/></linearGradient></defs><rect x="272" y="108" width="36" height="36" rx="8.459999999999999" fill="url(#t290_126)"/><g transform="translate(290,126) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></g><text x="290" y="162" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Organization</text><text x="290" y="184" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Acme Facilities owns everything</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M290,192 L290,236" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="60" y="236" width="460" height="330" rx="14" fill="#f0f5f9" stroke="#2F6FB0" stroke-width="1.6"/><defs><linearGradient id="t100_281" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="82" y="263" width="36" height="36" rx="8.459999999999999" fill="url(#t100_281)"/><g transform="translate(100,281) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></g><text x="138" y="278" font-size="15" font-weight="700" fill="#25324A">Location</text><text x="138" y="298" font-size="12" fill="#7C8A9C">the top-level place hierarchy</text><text x="100" y="338" font-size="13.5" font-family="ui-monospace,Menlo,monospace" fill="#25324A">HQ</text><text x="360" y="338" font-size="11" fill="#7C8A9C">site</text><text x="130" y="364" font-size="13.5" font-family="ui-monospace,Menlo,monospace" fill="#25324A">› Block A</text><text x="360" y="364" font-size="11" fill="#7C8A9C">building</text><text x="160" y="390" font-size="13.5" font-family="ui-monospace,Menlo,monospace" fill="#25324A">› Floor 2</text><text x="360" y="390" font-size="11" fill="#7C8A9C">floor</text><text x="190" y="416" font-size="13.5" font-family="ui-monospace,Menlo,monospace" fill="#25324A">› Room 204</text><text x="360" y="416" font-size="11" fill="#7C8A9C">room</text><circle cx="228" cy="438" r="4" fill="#2E9E6B"/><text x="242" y="442" font-size="13.5" font-weight="700" fill="#25324A">AC unit</text><text x="360" y="442" font-size="11" fill="#7C8A9C">the device</text><text x="100" y="514" font-size="11.5" fill="#7C8A9C">14 kinds, from continent down to zone.</text><text x="100" y="534" font-size="11.5" fill="#7C8A9C">Every device, entity, and group has one location.</text><rect x="560" y="236" width="360" height="150" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t740_266" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="722" y="248" width="36" height="36" rx="8.459999999999999" fill="url(#t740_266)"/><g transform="translate(740,266) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></g><text x="740" y="302" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Groups</text><text x="740" y="324" text-anchor="middle" font-size="12.5" fill="#7C8A9C">“Meeting-room ACs”</text><text x="740" y="342" text-anchor="middle" font-size="12.5" fill="#7C8A9C">every AC, across rooms</text><text x="740" y="360" text-anchor="middle" font-size="12.5" fill="#7C8A9C">act on them together</text><rect x="560" y="412" width="360" height="150" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t740_442" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="722" y="424" width="36" height="36" rx="8.459999999999999" fill="url(#t740_442)"/><g transform="translate(740,442) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r="1"/></g><text x="740" y="478" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Tags</text><text x="740" y="500" text-anchor="middle" font-size="12.5" fill="#7C8A9C">“critical”</text><text x="740" y="518" text-anchor="middle" font-size="12.5" fill="#7C8A9C">marks important devices</text><text x="740" y="536" text-anchor="middle" font-size="12.5" fill="#7C8A9C">wherever they are</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M520,311 L560,311" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M520,487 L560,487" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="540" y="300" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7C8A9C">also</text><text x="490" y="596" text-anchor="middle" font-size="12.5" fill="#7C8A9C">The AC unit lives in Room 204, is in the Meeting-room ACs group, and is tagged critical: three ways to find and scope it.</text></svg>