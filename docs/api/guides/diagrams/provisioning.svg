<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 190" width="1020" height="190" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Provisioning flow: mint a token, the device connects, waits, is accepted, and becomes managed">
  <title>Provisioning a device, end to end</title>
  <desc>Mint an enrollment token, point devices at wss://host/shelly with it, they land in the waiting room, an operator accepts them, and they become managed devices.</desc>
  <defs>
    <marker id="pvN" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8A97A8"/></marker>
  </defs>
  <rect x="0" y="0" width="1020" height="190" fill="#ffffff"/>

  <path d="M200,104 L222,104" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#pvN)"/>
  <path d="M404,104 L426,104" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#pvN)"/>
  <path d="M598,104 L614,104" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#pvN)"/>
  <path d="M796,104 L812,104" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#pvN)"/>

  <g font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">
    <circle cx="40" cy="72" r="11" fill="#4495D1"/><text x="40" y="76">1</text>
    <circle cx="244" cy="72" r="11" fill="#4495D1"/><text x="244" y="76">2</text>
    <circle cx="448" cy="72" r="11" fill="#D9930B"/><text x="448" y="76">3</text>
    <circle cx="636" cy="72" r="11" fill="#4495D1"/><text x="636" y="76">4</text>
    <circle cx="834" cy="72" r="11" fill="#2E9E6B"/><text x="834" y="76">5</text>
  </g>

  <rect x="20" y="72" width="180" height="82" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="110" y="106" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">Mint token</text>
  <text x="110" y="124" text-anchor="middle" font-size="9.5" fill="#3A6B92" font-family="ui-monospace,Menlo,monospace">EnrollmentToken.Create</text>
  <text x="110" y="140" text-anchor="middle" font-size="10" fill="#6B7A90">device-agnostic</text>

  <rect x="224" y="72" width="180" height="82" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="314" y="106" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">Device connects</text>
  <text x="314" y="124" text-anchor="middle" font-size="9.5" fill="#3A6B92" font-family="ui-monospace,Menlo,monospace">/shelly?token=</text>
  <text x="314" y="140" text-anchor="middle" font-size="10" fill="#6B7A90">first status frame</text>

  <rect x="428" y="72" width="170" height="82" rx="6" fill="#FFF7E8" stroke="#D9930B" stroke-width="1.5"/>
  <text x="513" y="106" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">Waiting room</text>
  <text x="513" y="126" text-anchor="middle" font-size="10.5" fill="#8A6100">PENDING · no DB row</text>

  <rect x="616" y="72" width="180" height="82" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="706" y="106" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">Operator accepts</text>
  <text x="706" y="124" text-anchor="middle" font-size="9.5" fill="#3A6B92" font-family="ui-monospace,Menlo,monospace">AcceptPendingById</text>
  <text x="706" y="140" text-anchor="middle" font-size="10" fill="#6B7A90">single or bulk</text>

  <rect x="814" y="72" width="180" height="82" rx="6" fill="#EAF7F0" stroke="#2E9E6B" stroke-width="1.5"/>
  <text x="904" y="106" text-anchor="middle" font-size="12.5" font-weight="600" fill="#122A4F">Managed device</text>
  <text x="904" y="126" text-anchor="middle" font-size="10.5" fill="#2E7D5B">ALLOWED · row created</text>
</svg>
