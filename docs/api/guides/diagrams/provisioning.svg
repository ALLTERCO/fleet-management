<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" width="1120" height="520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Provisioning: connect and enroll a device"><title>Provisioning: connect and enroll a device</title><desc>Provisioning points a Shelly device at Fleet Manager. You set the device outbound WebSocket config with WS.SetConfig so its server is wss://your-host/shelly, optionally carrying a token in the query string. The device then opens that WebSocket; Fleet Manager reads the device identity from the src field of its first status frame. If the device presents a known token it is recognized and routed to its organization, either accepted or placed in that organization waiting room. If it has no token it is an unknown device and waits in the waiting room for an operator to accept, or is refused if the waiting room is turned off. Once accepted it becomes a managed device.</desc><rect width="1120" height="520" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Provisioning: connect and enroll a device</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Point the device at Fleet Manager. With a known token it is recognized; without one it waits for an operator.</text><rect x="40" y="178" width="248" height="152" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t164_208" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="146" y="190" width="36" height="36" rx="8.459999999999999" fill="url(#t164_208)"/><g transform="translate(164,208) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></g><text x="164" y="244" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">1 · Configure the device</text><text x="164" y="266" text-anchor="middle" font-size="12.5" fill="#7C8A9C">WS.SetConfig sets its server</text><text x="164" y="284" text-anchor="middle" font-size="12.5" fill="#7C8A9C">wss://host/shelly</text><text x="164" y="302" text-anchor="middle" font-size="12.5" fill="#7C8A9C">optionally a ?token</text><rect x="320" y="194" width="210" height="124" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t425_224" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="407" y="206" width="36" height="36" rx="8.459999999999999" fill="url(#t425_224)"/><g transform="translate(425,224) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-5M9 8V2M15 8V2M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></g><text x="425" y="260" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">2 · The device connects</text><text x="425" y="282" text-anchor="middle" font-size="12.5" fill="#7C8A9C">it opens the WebSocket</text><text x="425" y="300" text-anchor="middle" font-size="12.5" fill="#7C8A9C">its src field is its identity</text><rect x="636" y="92" width="272" height="152" rx="12" fill="#eaf1f7" stroke="#2F6FB0" stroke-width="1.5"/><defs><linearGradient id="t772_122" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="754" y="104" width="36" height="36" rx="8.459999999999999" fill="url(#t772_122)"/><g transform="translate(772,122) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></g><text x="772" y="158" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Known token</text><text x="772" y="180" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Fleet Manager recognizes it</text><text x="772" y="198" text-anchor="middle" font-size="12.5" fill="#7C8A9C">routed to its organization</text><text x="772" y="216" text-anchor="middle" font-size="12.5" fill="#7C8A9C">accepted, or its org’s room</text><rect x="636" y="300" width="272" height="168" rx="12" fill="#f9f3e8" stroke="#C6851B" stroke-width="1.5"/><defs><linearGradient id="t772_330" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="754" y="312" width="36" height="36" rx="8.459999999999999" fill="url(#t772_330)"/><g transform="translate(772,330) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></g><text x="772" y="366" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">No token</text><text x="772" y="388" text-anchor="middle" font-size="12.5" fill="#7C8A9C">an unknown device</text><text x="772" y="406" text-anchor="middle" font-size="12.5" fill="#7C8A9C">waits in the waiting room</text><text x="772" y="424" text-anchor="middle" font-size="12.5" fill="#7C8A9C">an operator accepts it</text><text x="772" y="442" text-anchor="middle" font-size="12.5" fill="#7C8A9C">or refused if the room is off</text><rect x="940" y="196" width="164" height="124" rx="12" fill="#eaf5f0" stroke="#2E9E6B" stroke-width="1.5"/><defs><linearGradient id="t1022_226" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="1004" y="208" width="36" height="36" rx="8.459999999999999" fill="url(#t1022_226)"/><g transform="translate(1022,226) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></g><text x="1022" y="262" text-anchor="middle" font-size="14.5" font-weight="700" fill="#25324A">Managed device</text><text x="1022" y="284" text-anchor="middle" font-size="12.5" fill="#7C8A9C">now under</text><text x="1022" y="302" text-anchor="middle" font-size="12.5" fill="#7C8A9C">fleet management</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M288,255 L320,255" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M530,246 L584,246 L584,168 L636,168" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="aC6851B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#C6851B"/></marker></defs><path d="M530,266 L584,266 L584,384 L636,384" fill="none" stroke="#C6851B" stroke-width="1.7" marker-end="url(#aC6851B)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M908,168 L924,168 L924,240 L940,240" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M908,384 L924,384 L924,276 L940,276" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="539.15" y="196" width="89.7" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="584" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">has a token</text><rect x="549.2" y="330" width="69.6" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="584" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#C6851B">no token</text></svg>