<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 592" width="980" height="592" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Transport: one WebSocket over time"><title>Transport: one WebSocket over time</title><desc>A single WebSocket carries everything. The client sends a call with an id (for example id 7, Switch.Set); Fleet Manager replies with a result that carries the same id 7, so the client can match it. Fleet Manager also pushes a NotifyStatus event on its own, with no id, because nothing asked for it. When the client sends a bad call (id 8), Fleet Manager replies with an error that carries id 8 and an error code.</desc><rect width="980" height="592" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Transport: one socket over time</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">One WebSocket carries calls, id-matched replies, pushed events, and errors.</text><line x1="210" y1="196" x2="210" y2="548" stroke="#c4cad2" stroke-width="1.5" stroke-dasharray="3 5"/><line x1="770" y1="196" x2="770" y2="548" stroke="#c4cad2" stroke-width="1.5" stroke-dasharray="3 5"/><defs><linearGradient id="t210_120" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="184" y="94" width="52" height="52" rx="12.219999999999999" fill="url(#t210_120)"/><g transform="translate(210,120) scale(0.8666666666666667) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7l-5 5 5 5M15 7l5 5-5 5"/></g><text x="210" y="164" text-anchor="middle" font-size="12.5" font-weight="600" fill="#25324A">Client</text><defs><linearGradient id="t770_120" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="744" y="94" width="52" height="52" rx="12.219999999999999" fill="url(#t770_120)"/><g transform="translate(770,120) scale(0.8666666666666667) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4.5l3-8 5 16 3-8H21"/></g><text x="770" y="164" text-anchor="middle" font-size="12.5" font-weight="600" fill="#25324A">Fleet Manager</text><text x="210" y="182" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">"my-client"</text><text x="770" y="182" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">"FLEET_MANAGER"</text><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M238,236 L742,236" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><circle cx="250" cy="223" r="9" fill="#2F6FB0"/><text x="250" y="227" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text><text x="490" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">call · id 7 · Switch.Set</text><defs><marker id="a2E9E6B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2E9E6B"/></marker></defs><path d="M742,298 L238,298" fill="none" stroke="#2E9E6B" stroke-width="1.7" marker-end="url(#a2E9E6B)"/><circle cx="730" cy="285" r="9" fill="#2E9E6B"/><text x="730" y="289" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text><text x="490" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">result · id 7</text><defs><marker id="a4F5D95" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4F5D95"/></marker></defs><path d="M742,380 L238,380" fill="none" stroke="#4F5D95" stroke-width="1.7" marker-end="url(#a4F5D95)"/><circle cx="730" cy="367" r="9" fill="#4F5D95"/><text x="730" y="371" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text><text x="490" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">NotifyStatus · pushed</text><defs><marker id="a2F6FB0" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2F6FB0"/></marker></defs><path d="M238,452 L742,452" fill="none" stroke="#2F6FB0" stroke-width="1.7" marker-end="url(#a2F6FB0)"/><circle cx="250" cy="439" r="9" fill="#2F6FB0"/><text x="250" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text><text x="490" y="444" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">call · id 8</text><defs><marker id="aC6851B" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#C6851B"/></marker></defs><path d="M742,514 L238,514" fill="none" stroke="#C6851B" stroke-width="1.7" marker-end="url(#aC6851B)"/><circle cx="730" cy="501" r="9" fill="#C6851B"/><text x="730" y="505" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text><text x="490" y="506" text-anchor="middle" font-size="12" font-weight="600" fill="#25324A">error · id 8 · code</text><text x="490" y="273" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7C8A9C">same id → the client matches the reply</text><text x="490" y="357" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7C8A9C">no id → the server pushed it, unprompted</text><text x="490" y="491" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7C8A9C">same id → the error is for that call</text><text x="490" y="574" text-anchor="middle" font-size="12" fill="#7C8A9C">a frame's <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">src</tspan> and <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">dst</tspan> are these two names; the arrow points from <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">src</tspan> to <tspan font-family="ui-monospace,Menlo,monospace" font-weight="700" fill="#25324A">dst</tspan></text></svg>