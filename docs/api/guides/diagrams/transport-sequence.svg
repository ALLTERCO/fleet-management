<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 396" width="760" height="396" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="One WebSocket: request, id-matched response, and server-pushed events">
  <title>One socket: call, id-matched result, pushed events</title>
  <desc>Over one WebSocket a client sends a JSON-RPC call with an id; Fleet Manager relays it to the device and returns a result echoing the same id; later the server pushes an id-less NotifyStatus event; a bad call returns an error carrying the id.</desc>
  <defs>
    <marker id="sB" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4495D1"/></marker>
    <marker id="sN" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8A97A8"/></marker>
    <marker id="sG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2E9E6B"/></marker>
    <marker id="sP" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7A5AF0"/></marker>
    <marker id="sR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#DD344C"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="396" fill="#ffffff"/>

  <!-- lifelines -->
  <g stroke="#C9D4E2" stroke-width="1.25" stroke-dasharray="4 4">
    <line x1="120" y1="66" x2="120" y2="368"/>
    <line x1="380" y1="66" x2="380" y2="368"/>
    <line x1="640" y1="66" x2="640" y2="368"/>
  </g>

  <!-- headers -->
  <rect x="62" y="20" width="116" height="44" rx="6" fill="#EAF6FD" stroke="#4495D1" stroke-width="1.5"/>
  <text x="120" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#122A4F">Client</text>
  <rect x="312" y="20" width="136" height="44" rx="6" fill="#F4F7FB" stroke="#003C82" stroke-width="1.5"/>
  <text x="380" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#122A4F">Fleet Manager</text>
  <rect x="592" y="20" width="96" height="44" rx="6" fill="#F4F7FB" stroke="#C9D4E2" stroke-width="1.5"/>
  <text x="640" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#122A4F">Device</text>

  <!-- M1 call -->
  <path d="M120,104 L374,104" stroke="#4495D1" stroke-width="1.75" fill="none" marker-end="url(#sB)"/>
  <rect x="150" y="86" width="196" height="16" rx="8" fill="#ffffff"/>
  <text x="248" y="98" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#2C6C99">device.List { id: 1 }</text>
  <circle cx="120" cy="104" r="8" fill="#4495D1"/><text x="120" y="107.5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>

  <!-- M2 relay -->
  <path d="M380,140 L634,140" stroke="#8A97A8" stroke-width="1.5" fill="none" marker-end="url(#sN)"/>
  <rect x="452" y="122" width="112" height="16" rx="8" fill="#ffffff"/>
  <text x="508" y="134" text-anchor="middle" font-size="10.5" fill="#6B7A90">relay to device</text>
  <circle cx="380" cy="140" r="8" fill="#8A97A8"/><text x="380" y="143.5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>

  <!-- M3 result -->
  <path d="M380,178 L126,178" stroke="#2E9E6B" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#sG)"/>
  <rect x="150" y="160" width="196" height="16" rx="8" fill="#ffffff"/>
  <text x="248" y="172" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#2E7D5B">result { id: 1 }</text>
  <circle cx="380" cy="178" r="8" fill="#2E9E6B"/><text x="380" y="181.5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
  <text x="248" y="200" text-anchor="middle" font-size="10" fill="#8A97A8">request and response are matched by <tspan font-family="ui-monospace,Menlo,monospace">id</tspan></text>

  <!-- M4 device event -->
  <path d="M634,262 L386,262" stroke="#7A5AF0" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#sP)"/>
  <rect x="452" y="244" width="112" height="16" rx="8" fill="#ffffff"/>
  <text x="508" y="256" text-anchor="middle" font-size="10.5" fill="#6A5AB8">status change</text>

  <!-- M5 push -->
  <path d="M380,300 L126,300" stroke="#7A5AF0" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#sP)"/>
  <rect x="146" y="282" width="204" height="16" rx="8" fill="#ffffff"/>
  <text x="248" y="294" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#6A5AB8">NotifyStatus (no id)</text>
  <circle cx="380" cy="300" r="8" fill="#7A5AF0"/><text x="380" y="303.5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>

  <!-- M6 error -->
  <path d="M380,352 L126,352" stroke="#DD344C" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#sR)"/>
  <rect x="150" y="334" width="196" height="16" rx="8" fill="#ffffff"/>
  <text x="248" y="346" text-anchor="middle" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#B42318">error { code, id }</text>
  <text x="508" y="346" text-anchor="middle" font-size="10" fill="#8A97A8">on a bad call</text>
  <circle cx="380" cy="352" r="8" fill="#DD344C"/><text x="380" y="355.5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
</svg>
