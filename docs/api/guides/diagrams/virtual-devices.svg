<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Virtual devices: one device built from parts of other real devices"><title>Virtual devices: one device built from parts of other real devices</title><desc>A virtual device is one device you build from parts of other real devices. It works like a normal device and keeps its own history. For example, a Fireplace can be made from three parts: on/off comes from a relay, temperature comes from a sensor, and power used comes from a meter. Each part points to one real component on a real device. If you swap a real device for a new one, the Fireplace stays the same and keeps its history.</desc><rect width="960" height="520" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Virtual devices</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">One device built from parts of other real devices. It works like a normal device.</text><text x="40" y="96" font-size="12" font-weight="600" fill="#7C8A9C">Example: a Fireplace built from a relay, a sensor, and a meter. Each part points to one real component.</text><rect x="60" y="132" width="320" height="336" rx="14" fill="#f0f5f9" stroke="#2F6FB0" stroke-width="1.6"/><defs><linearGradient id="t220_176" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="202" y="158" width="36" height="36" rx="8.459999999999999" fill="url(#t220_176)"/><g transform="translate(220,176) scale(0.6) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></g><text x="220" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#25324A">Fireplace</text><text x="220" y="229" text-anchor="middle" font-size="12" fill="#7C8A9C">a virtual device that keeps its history</text><rect x="86" y="260" width="268" height="48" rx="9" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="220" y="289" text-anchor="middle" font-size="14.5" font-weight="600" fill="#25324A">on / off</text><rect x="86" y="330" width="268" height="48" rx="9" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="220" y="359" text-anchor="middle" font-size="14.5" font-weight="600" fill="#25324A">temperature</text><rect x="86" y="400" width="268" height="48" rx="9" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="220" y="429" text-anchor="middle" font-size="14.5" font-weight="600" fill="#25324A">power used</text><rect x="650" y="250" width="230" height="68" rx="10" fill="#f2f3f5" stroke="#5B6B82" stroke-width="1.3"/><text x="765" y="273" text-anchor="middle" font-size="14" font-weight="700" fill="#25324A">a relay</text><text x="765" y="292" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">switch:0</text><text x="765" y="310" text-anchor="middle" font-size="11.5" fill="#7C8A9C">device A</text><rect x="650" y="320" width="230" height="68" rx="10" fill="#f2f3f5" stroke="#5B6B82" stroke-width="1.3"/><text x="765" y="343" text-anchor="middle" font-size="14" font-weight="700" fill="#25324A">a sensor</text><text x="765" y="362" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">temperature:0</text><text x="765" y="380" text-anchor="middle" font-size="11.5" fill="#7C8A9C">device B</text><rect x="650" y="390" width="230" height="68" rx="10" fill="#f2f3f5" stroke="#5B6B82" stroke-width="1.3"/><text x="765" y="413" text-anchor="middle" font-size="14" font-weight="700" fill="#25324A">a meter</text><text x="765" y="432" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">em:0</text><text x="765" y="450" text-anchor="middle" font-size="11.5" fill="#7C8A9C">device C</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M380,284 L650,284" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M380,354 L650,354" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M380,424 L650,424" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><rect x="476.85" y="344" width="76.30000000000001" height="20" rx="10" fill="#ffffff" stroke="#D3DDEA" stroke-width="1"/><text x="515" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#2F6FB0">points to</text><text x="480" y="504" text-anchor="middle" font-size="12.5" fill="#7C8A9C">Swap a real device for a new one and the Fireplace stays the same, and keeps its history.</text></svg>