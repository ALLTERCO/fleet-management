<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 500" width="1180" height="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Webhooks: device-fired webhooks versus Fleet-Manager-sent alert-delivery webhooks"><title>Webhooks: device-fired webhooks versus Fleet-Manager-sent alert-delivery webhooks</title><desc>Two different things share the name webhook. Device webhooks are fired by the Shelly device: on a device event the firmware POSTs to your URL. You manage them fleet-wide through the relayed webhook namespace (webhook.Create with shellyID, event, and urls), but the event names and templating belong to the firmware and about 20 hooks fit per device. Alert-delivery webhooks are sent by Fleet Manager: when an alert fires it is delivered through a channel you register with channel.Create, using provider generic_webhook for a plain JSON POST or webhook_signed for an HMAC-signed POST. The signed variant adds an fm-signature header t and v1 where v1 is HMAC-SHA256 of the secret over t dot body; verify it in constant time and reject if t is older than about five minutes.</desc><rect width="1180" height="500" fill="#ffffff"/><text x="40" y="42" font-size="18" font-weight="700" fill="#122A4F">Webhooks</text><text x="40" y="64" font-size="12.5" fill="#6B7A90">Two different things share the name. One fires from the device; one is sent by Fleet Manager.</text><line x1="590" y1="112" x2="590" y2="446" stroke="#D3DDEA" stroke-width="1.25" stroke-dasharray="5 4"/><rect x="40" y="96" width="512" height="350" rx="12" fill="none" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="5 4"/><text x="54" y="116" font-size="10.5" font-weight="400" letter-spacing="0.06em" fill="#9AA8BA">FIRED BY THE DEVICE</text><defs><linearGradient id="t150_210" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5B6B82"/><stop offset="1" stop-color="#4d5b6f"/></linearGradient></defs><rect x="120" y="180" width="60" height="60" rx="14.1" fill="url(#t150_210)"/><g transform="translate(150,210) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></g><text x="150" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Shelly device</text><text x="150" y="274" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">firmware</text><defs><linearGradient id="t430_210" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="400" y="180" width="60" height="60" rx="14.1" fill="url(#t430_210)"/><g transform="translate(430,210) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></g><text x="430" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Your endpoint</text><text x="430" y="274" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">your URL</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M188,210 L392,210" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="290" y="196" text-anchor="middle" font-size="11.5" fill="#7C8A9C">device event → POST</text><text x="296" y="330" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Manage fleet-wide with webhook.Create</text><text x="296" y="350" text-anchor="middle" font-size="11.5" fill="#7C8A9C">{ shellyID, event, urls[] }, relayed to the device.</text><text x="296" y="370" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Event names and templating are the firmware’s.</text><text x="296" y="388" text-anchor="middle" font-size="11.5" fill="#7C8A9C">About 20 hooks per device (10 if battery).</text><rect x="628" y="96" width="512" height="350" rx="12" fill="none" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="5 4"/><text x="642" y="116" font-size="10.5" font-weight="400" letter-spacing="0.06em" fill="#9AA8BA">SENT BY FLEET MANAGER</text><defs><linearGradient id="t720_210" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C6851B"/><stop offset="1" stop-color="#a87117"/></linearGradient></defs><rect x="690" y="180" width="60" height="60" rx="14.1" fill="url(#t720_210)"/><g transform="translate(720,210) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18v-6a5 5 0 1 1 10 0v6"/><path d="M5 21a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-1a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2z"/><path d="M21 12h1M18.5 4.5 18 5M2 12h1M12 2v1M4.929 4.929l.707.707M12 12v6"/></g><text x="720" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Alert fires</text><text x="720" y="274" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">a rule matched</text><defs><linearGradient id="t900_210" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F6FB0"/><stop offset="1" stop-color="#285e96"/></linearGradient></defs><rect x="870" y="180" width="60" height="60" rx="14.1" fill="url(#t900_210)"/><g transform="translate(900,210) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></g><text x="900" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Channel</text><text x="900" y="274" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">webhook / signed</text><defs><linearGradient id="t1070_210" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9E6B"/><stop offset="1" stop-color="#27865b"/></linearGradient></defs><rect x="1040" y="180" width="60" height="60" rx="14.1" fill="url(#t1070_210)"/><g transform="translate(1070,210) scale(1) translate(-12,-12)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></g><text x="1070" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#25324A">Your endpoint</text><text x="1070" y="274" text-anchor="middle" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#7C8A9C">your URL</text><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M758,210 L864,210" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><defs><marker id="a7C8A9C" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C8A9C"/></marker></defs><path d="M936,210 L1034,210" fill="none" stroke="#7C8A9C" stroke-width="1.7" marker-end="url(#a7C8A9C)"/><text x="985" y="196" text-anchor="middle" font-size="11.5" fill="#7C8A9C">HTTP POST</text><text x="884" y="330" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Register with channel.Create</text><text x="884" y="350" text-anchor="middle" font-size="11.5" fill="#7C8A9C">(generic_webhook or webhook_signed).</text><text x="884" y="370" text-anchor="middle" font-size="11.5" fill="#7C8A9C">Signed adds fm-signature: t,v1 = HMAC-SHA256(secret,"t.body")</text><text x="884" y="388" text-anchor="middle" font-size="11.5" fill="#7C8A9C">verify in constant time, reject if t older than ~5 min.</text></svg>